<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RankPilot AI — แดชบอร์ด AEO + SEO อัตโนมัติ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RankPilot AI — Design System
   AEO + SEO Automation Platform (Thai-first)
   Faithful to Project Concept PDF v1.0
   ============================================================ */

:root {
  /* Brand */
  --brand-500: #6366f1;
  --brand-600: #5b52e5;
  --brand-700: #4f46e5;
  --brand-800: #4338ca;
  --brand-900: #3730a3;
  --purple-700: #6d28d9;
  --purple-600: #7c3aed;
  --grad-start: #5b6ef5;
  --grad-end: #17b978;

  /* Semantic */
  --green-500: #16a34a;
  --green-600: #15803d;
  --green-bg: #dcfce7;
  --green-text: #15803d;
  --red-500: #dc2626;
  --red-bg: #fee2e2;
  --red-text: #b91c1c;
  --amber-500: #f59e0b;
  --amber-600: #d97706;
  --amber-bg: #fef3c7;
  --amber-text: #b45309;
  --blue-bg: #dbeafe;
  --blue-text: #1d4ed8;
  --purple-bg: #ede9fe;
  --purple-text: #6d28d9;
  --gold-bg: #fdf0c8;
  --gold-text: #92600a;

  /* Neutrals (light) */
  --navy: #1e2749;
  --navy-2: #22284a;
  --bg: #f4f5fb;
  --surface: #ffffff;
  --surface-2: #faf9ff;
  --row-alt: #f6f4fc;
  --border: #e6e6f0;
  --border-2: #eceaf6;
  --text: #1f2340;
  --text-muted: #6b7091;
  --text-soft: #8a8fad;
  --link: #2563eb;

  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 2px rgba(30, 39, 73, .06);
  --shadow: 0 6px 24px rgba(50, 50, 93, .07), 0 2px 8px rgba(30, 39, 73, .04);
  --shadow-lg: 0 18px 50px rgba(50, 50, 93, .14), 0 8px 20px rgba(30, 39, 73, .07);
  --sidebar-w: 264px;
  --font: 'Sarabun', 'Prompt', 'IBM Plex Sans Thai', 'Noto Sans Thai',
          'Leelawadee UI', 'Segoe UI', Tahoma, system-ui, -apple-system, sans-serif;
}

[data-theme="dark"] {
  --navy: #0e1330;
  --navy-2: #12173a;
  --bg: #0b0e22;
  --surface: #141834;
  --surface-2: #171c3d;
  --row-alt: #191e41;
  --border: #262b52;
  --border-2: #2a2f5a;
  --text: #e7e8f5;
  --text-muted: #a3a8cc;
  --text-soft: #7b81aa;
  --green-bg: #113524;
  --red-bg: #3a1620;
  --amber-bg: #3a2a0c;
  --blue-bg: #14284f;
  --purple-bg: #241a4a;
  --gold-bg: #3a2f12;
  --gold-text: #f4d585;
  --shadow: 0 6px 24px rgba(0, 0, 0, .35);
  --shadow-lg: 0 18px 50px rgba(0, 0, 0, .5);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }
::selection { background: rgba(99,102,241,.22); }

/* ---------- Layout ---------- */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-w);
  flex: 0 0 var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  z-index: 40;
}
.brand {
  display: flex; align-items: center; gap: 11px;
  padding: 20px 20px 16px;
}
.brand .logo {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
  display: grid; place-items: center;
  color: #fff; font-weight: 800; font-size: 18px;
  box-shadow: 0 6px 16px rgba(91,110,245,.35);
}
.brand .name { font-weight: 800; font-size: 17px; letter-spacing: .2px; }
.brand .name span { color: var(--brand-700); }
.brand .tag { font-size: 11px; color: var(--text-soft); margin-top: -2px; }

.nav { padding: 6px 12px; overflow-y: auto; flex: 1; }
.nav-section {
  font-size: 11px; font-weight: 700; letter-spacing: .8px;
  color: var(--text-soft); text-transform: uppercase;
  padding: 14px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 12px; border-radius: 10px;
  color: var(--text-muted); font-weight: 600; font-size: 14px;
  cursor: pointer; border: none; background: none; width: 100%; text-align: right;
  flex-direction: row-reverse; justify-content: flex-end;
  transition: background .12s, color .12s;
}
.nav-item .ico { font-size: 17px; width: 22px; text-align: center; flex: 0 0 22px; }
.nav-item .lbl { flex: 1; text-align: left; }
.nav-item .code {
  font-size: 10px; font-weight: 800; color: var(--text-soft);
  background: var(--bg); border-radius: 6px; padding: 1px 6px;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(99,102,241,.14), rgba(23,185,120,.10));
  color: var(--brand-700); font-weight: 700;
}
[data-theme="dark"] .nav-item.active { color: #c3c1ff; }
.nav-item.active .code { color: var(--brand-700); background: rgba(99,102,241,.16); }

.sidebar-foot {
  padding: 14px 16px; border-top: 1px solid var(--border);
  font-size: 11.5px; color: var(--text-soft);
}
.sidebar-foot b { color: var(--text-muted); }

/* ---------- Main ---------- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 26px; background: var(--surface);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 30;
}
.topbar .crumbs { font-size: 13px; color: var(--text-soft); }
.topbar .crumbs b { color: var(--text); font-weight: 700; }
.topbar .spacer { flex: 1; }
.topbar .mode-pill {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12.5px; font-weight: 700; padding: 6px 12px;
  border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface-2); color: var(--text-muted);
}
.topbar .mode-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber-500); }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); display: grid; place-items: center; font-size: 17px;
  color: var(--text-muted);
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }

.content { padding: 26px; max-width: 1360px; width: 100%; margin: 0 auto; }
.mobile-nav-btn { display: none; }

/* ---------- Page header ---------- */
.page-head { margin-bottom: 20px; }
.page-head .eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 800; letter-spacing: .4px;
  color: var(--brand-700); text-transform: uppercase; margin-bottom: 4px;
}
.page-head h1 { font-size: 25px; font-weight: 800; margin: 0 0 4px; letter-spacing: .2px; }
.page-head p { margin: 0; color: var(--text-muted); font-size: 14.5px; max-width: 820px; }
.accent-bar { height: 4px; width: 60px; border-radius: 4px;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-end)); margin: 12px 0 0; }

/* ---------- Cards ---------- */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.card-pad { padding: 20px 22px; }
.card-head {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 22px; border-bottom: 1px solid var(--border);
}
.card-head h3 { margin: 0; font-size: 16px; font-weight: 800; }
.card-head .sub { font-size: 12.5px; color: var(--text-soft); font-weight: 500; }
.card-head .spacer { flex: 1; }

.grid { display: grid; gap: 18px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.mb { margin-bottom: 18px; }
.mb-l { margin-bottom: 26px; }

/* ---------- KPI / stat tiles ---------- */
.kpi {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px; position: relative; overflow: hidden;
}
.kpi::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(var(--grad-start), var(--grad-end));
}
.kpi .k-label { font-size: 13px; color: var(--text-muted); font-weight: 600; }
.kpi .k-value { font-size: 32px; font-weight: 800; line-height: 1.1; margin: 6px 0 2px; letter-spacing: -.5px; }
.kpi .k-value.pos { color: var(--green-600); }
.kpi .k-value.brand { color: var(--purple-700); }
.kpi .k-foot { font-size: 12px; color: var(--text-soft); display: flex; align-items: center; gap: 6px; }
.kpi .trend-up { color: var(--green-600); font-weight: 700; }
.kpi .trend-down { color: var(--red-text); font-weight: 700; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  font-weight: 700; font-size: 14px; padding: 9px 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface); color: var(--text);
  transition: transform .05s, box-shadow .12s, background .12s;
}
.btn:hover { background: var(--surface-2); }
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--brand-700); border-color: var(--brand-700); color: #fff; }
.btn-primary:hover { background: var(--brand-800); }
.btn-green { background: var(--green-500); border-color: var(--green-500); color: #fff; }
.btn-green:hover { background: var(--green-600); }
.btn-ghost { background: transparent; }
.btn-sm { padding: 6px 11px; font-size: 12.5px; border-radius: 8px; }
.btn-block { width: 100%; }

/* ---------- Badges / chips ---------- */
.badge {
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
  background: var(--bg); color: var(--text-muted);
}
.badge.green { background: var(--green-bg); color: var(--green-text); }
.badge.red { background: var(--red-bg); color: var(--red-text); }
.badge.amber { background: var(--amber-bg); color: var(--amber-text); }
.badge.blue { background: var(--blue-bg); color: var(--blue-text); }
.badge.purple { background: var(--purple-bg); color: var(--purple-text); }
.badge.gold { background: var(--gold-bg); color: var(--gold-text); }
.badge.dot::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .85; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; font-weight: 600; padding: 5px 11px; border-radius: 999px;
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted);
}
.chip.on { background: var(--brand-700); border-color: var(--brand-700); color: #fff; }
.chip.lock { cursor: default; }

/* ---------- Tables ---------- */
.tbl-wrap { overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
table.tbl thead th {
  background: var(--navy); color: #eef; text-align: left;
  font-weight: 700; font-size: 12.5px; padding: 12px 16px; white-space: nowrap;
}
table.tbl thead th:first-child { border-top-left-radius: 10px; }
table.tbl thead th:last-child { border-top-right-radius: 10px; }
table.tbl tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.tbl tbody tr:nth-child(even) { background: var(--row-alt); }
table.tbl tbody tr:hover { background: var(--surface-2); }
table.tbl .num { font-variant-numeric: tabular-nums; font-weight: 700; }
table.tbl .muted { color: var(--text-soft); }
.tbl-title { font-weight: 700; color: var(--text); }
.tbl-title a { color: var(--link); font-weight: 700; }
.tbl-sub { font-size: 12px; color: var(--text-soft); display: flex; align-items: center; gap: 5px; margin-top: 2px; }

/* rank medal */
.rank-cell { display: flex; align-items: center; gap: 8px; }
.rank-medal {
  display: inline-flex; align-items: center; gap: 5px; font-weight: 800; font-size: 13px;
  background: var(--gold-bg); color: var(--gold-text); padding: 4px 9px; border-radius: 999px;
}
.rank-num {
  display: inline-grid; place-items: center; min-width: 30px; height: 26px;
  border-radius: 8px; background: var(--surface-2); border: 1px solid var(--border);
  font-weight: 800; font-size: 13px; color: var(--text-muted); padding: 0 6px;
}

/* trend */
.trend { font-weight: 700; font-size: 12.5px; display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 999px; }
.trend.up { background: var(--green-bg); color: var(--green-text); }
.trend.down { background: var(--red-bg); color: var(--red-text); }
.trend.same { background: var(--bg); color: var(--text-soft); }

/* history / link button in tables */
.link-btn {
  display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 12.5px;
  color: var(--brand-700); background: none; border: none; padding: 4px 6px; border-radius: 8px;
}
.link-btn:hover { background: var(--surface-2); text-decoration: none; }

/* ---------- Search / inputs ---------- */
.field {
  display: flex; align-items: center; gap: 10px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px; padding: 3px 6px 3px 14px;
}
.field:focus-within { border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(99,102,241,.14); }
.field .ico { color: var(--text-soft); font-size: 17px; }
.field input {
  flex: 1; border: none; outline: none; background: none; color: var(--text);
  font-size: 15px; font-family: inherit; padding: 9px 0;
}
.select, .input {
  border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px;
  background: var(--surface); color: var(--text); font-family: inherit; font-size: 14px;
}

/* ---------- Progress ---------- */
.bar { height: 8px; border-radius: 999px; background: var(--bg); overflow: hidden; }
.bar > span { display: block; height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-end)); }
.bar.green > span { background: var(--green-500); }
.bar.amber > span { background: var(--amber-500); }
.bar.thin { height: 6px; }

.ring { --p: 0; --sz: 92px; width: var(--sz); height: var(--sz); border-radius: 50%;
  background: conic-gradient(var(--brand-600) calc(var(--p)*1%), var(--bg) 0);
  display: grid; place-items: center; position: relative; }
.ring::before { content: ""; position: absolute; inset: 10px; background: var(--surface); border-radius: 50%; }
.ring .ring-val { position: relative; font-weight: 800; font-size: 20px; }

/* ---------- Loop stepper ---------- */
.loop { display: flex; align-items: stretch; gap: 8px; flex-wrap: wrap; }
.loop .step {
  flex: 1; min-width: 130px; border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 14px; background: var(--surface-2); position: relative;
}
.loop .step .n { font-size: 11px; font-weight: 800; color: var(--brand-700); letter-spacing: .5px; }
.loop .step .t { font-weight: 800; font-size: 14px; margin: 3px 0; }
.loop .step .d { font-size: 12px; color: var(--text-muted); }
.loop .arrow { align-self: center; color: var(--text-soft); font-size: 18px; }

/* ---------- Split panels ---------- */
.panel { border: 1px solid var(--border); border-radius: 12px; background: var(--surface); }
.panel-head { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 8px; }
.panel-body { padding: 14px 16px; }
.list-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
.list-row:last-child { border-bottom: none; }
.list-row .grow { flex: 1; min-width: 0; }
.list-row .t { font-weight: 700; font-size: 14px; }
.list-row .s { font-size: 12px; color: var(--text-soft); }

/* intent columns (M1) */
.intent-col { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--surface); }
.intent-head { padding: 14px 16px; display: flex; align-items: center; gap: 10px; color: #fff; }
.intent-head.rec { background: linear-gradient(120deg, #6d28d9, #8b5cf6); }
.intent-head.prob { background: linear-gradient(120deg, #0f766e, #14b8a6); }
.intent-head .ic { font-size: 20px; }
.intent-head .h { font-weight: 800; font-size: 15px; }
.intent-head .c { font-size: 12px; opacity: .9; }
.intent-head .count { margin-left: auto; background: rgba(255,255,255,.22); border-radius: 999px; padding: 2px 10px; font-weight: 800; font-size: 13px; }
.kw-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
.kw-row:last-child { border-bottom: none; }
.kw-row .kw { flex: 1; min-width: 0; }
.kw-row .kw .txt { font-weight: 600; font-size: 14px; }
.kw-row .kw .meta { font-size: 11.5px; color: var(--text-soft); display: flex; gap: 10px; margin-top: 2px; flex-wrap: wrap; }
.score-pill { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 999px; }
.score-pill.hi { background: var(--green-bg); color: var(--green-text); }
.score-pill.mid { background: var(--amber-bg); color: var(--amber-text); }
.score-pill.low { background: var(--red-bg); color: var(--red-text); }

/* page1 status */
.p1 { font-size: 11.5px; font-weight: 800; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; }
.p1.yes { background: var(--green-bg); color: var(--green-text); }
.p1.no { background: var(--bg); color: var(--text-soft); }

/* ---------- Modal ---------- */
.modal-back {
  position: fixed; inset: 0; background: rgba(15,18,40,.55); backdrop-filter: blur(3px);
  display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity .16s;
}
.modal-back.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border-radius: 18px; max-width: 720px; width: 100%;
  box-shadow: var(--shadow-lg); transform: translateY(10px); transition: transform .16s;
  max-height: calc(100vh - 80px); overflow: auto;
}
.modal-back.open .modal { transform: translateY(0); }
.modal-head { display: flex; align-items: center; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
.modal-head h3 { margin: 0; font-size: 17px; font-weight: 800; }
.modal-head .sub { font-size: 12.5px; color: var(--text-soft); }
.modal-body { padding: 20px 22px; }
.modal-close { margin-left: auto; }

/* verify banner */
.verify-banner {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 14px;
  background: linear-gradient(120deg, rgba(22,163,74,.12), rgba(23,185,120,.06));
  border: 1px solid rgba(22,163,74,.3);
}
.verify-banner .big { font-size: 26px; }
.verify-banner .t { font-weight: 800; color: var(--green-600); }
.verify-banner .s { font-size: 12.5px; color: var(--text-muted); }

/* ---------- Sparkline / mini-chart ---------- */
.spark { display: block; }
.chart-legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12.5px; color: var(--text-muted); }
.chart-legend span { display: inline-flex; align-items: center; gap: 6px; }
.chart-legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

/* bars chart */
.vbars { display: flex; align-items: flex-end; gap: 10px; height: 160px; padding-top: 10px; }
.vbars .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
.vbars .col .bar-v { width: 60%; max-width: 44px; border-radius: 8px 8px 0 0;
  background: linear-gradient(var(--grad-start), var(--grad-end)); position: relative; min-height: 4px; }
.vbars .col .cap { font-size: 11.5px; color: var(--text-soft); }
.vbars .col .val { font-size: 12px; font-weight: 800; }

/* ---------- Utility ---------- */
.row { display: flex; align-items: center; gap: 12px; }
.wrap { flex-wrap: wrap; }
.between { justify-content: space-between; }
.gap-s { gap: 8px; }
.muted { color: var(--text-muted); }
.soft { color: var(--text-soft); }
.small { font-size: 12.5px; }
.b { font-weight: 700; }
.bb { font-weight: 800; }
.center { text-align: center; }
.right { text-align: right; }
.nowrap { white-space: nowrap; }
.hint {
  font-size: 12.5px; color: var(--text-muted); background: var(--surface-2);
  border: 1px dashed var(--border); border-radius: 10px; padding: 10px 14px;
}
.note-box {
  border-left: 4px solid var(--brand-600); background: var(--purple-bg);
  border-radius: 8px; padding: 13px 16px; font-size: 13.5px; color: var(--text);
}
.warn-box {
  border-left: 4px solid var(--red-500); background: var(--red-bg);
  border-radius: 8px; padding: 13px 16px; font-size: 13.5px;
}
.ok-box {
  border-left: 4px solid var(--green-500); background: var(--green-bg);
  border-radius: 8px; padding: 13px 16px; font-size: 13.5px;
}
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.tag-list { display: flex; gap: 7px; flex-wrap: wrap; }

/* fade-in */
.view { animation: fade .22s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* toast */
.toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--navy); color: #fff; padding: 11px 18px; border-radius: 12px; font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-lg); animation: fade .2s; }
.toast .ok { color: #7ee2a8; }

/* ---------- Responsive ---------- */
@media (max-width: 1080px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 860px) {
  .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-102%); transition: transform .2s; box-shadow: var(--shadow-lg); }
  .sidebar.open { transform: none; }
  .mobile-nav-btn { display: grid; }
  .content { padding: 18px; }
  .grid-2 { grid-template-columns: 1fr; }
  .intent-wrap { grid-template-columns: 1fr !important; }
}
@media (max-width: 620px) {
  .grid-4, .grid-3 { grid-template-columns: 1fr; }
  .topbar { padding: 12px 16px; }
}
.scrim { display: none; }
.scrim.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 39; }

/* ---------- Auth (login/signup) ---------- */
.auth-screen {
  position: fixed; inset: 0; z-index: 300; display: grid; place-items: center; padding: 24px;
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(99,102,241,.28), transparent 60%),
    radial-gradient(900px 500px at 110% 110%, rgba(23,185,120,.22), transparent 55%),
    var(--bg);
  overflow: auto;
}
.auth-card {
  width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; box-shadow: var(--shadow-lg); padding: 30px 30px 26px; animation: fade .3s ease;
}
.auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.auth-brand .logo {
  width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; color: #fff;

  box-shadow: 0 8px 20px rgba(91,110,245,.4);
}
.auth-brand .name { font-weight: 800; font-size: 19px; }
.auth-brand .name span { color: var(--brand-700); }
.auth-card h2 { margin: 6px 0 2px; font-size: 20px; font-weight: 800; }
.auth-card .sub { color: var(--text-muted); font-size: 13.5px; margin-bottom: 18px; }
.auth-field { margin-bottom: 12px; }
.auth-field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
.auth-field input {
  width: 100%; border: 1px solid var(--border); border-radius: 11px; padding: 11px 13px;
  background: var(--surface-2); color: var(--text); font-family: inherit; font-size: 15px;
}
.auth-field input:focus { outline: none; border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(99,102,241,.14); }
.auth-tabs { display: flex; gap: 6px; background: var(--bg); border-radius: 12px; padding: 4px; margin-bottom: 18px; }
.auth-tabs button { flex: 1; border: none; background: none; padding: 8px; border-radius: 9px; font-weight: 700; font-size: 13.5px; color: var(--text-muted); cursor: pointer; }
.auth-tabs button.on { background: var(--surface); color: var(--brand-700); box-shadow: var(--shadow-sm); }
.auth-foot { text-align: center; margin-top: 14px; font-size: 12px; color: var(--text-soft); }
.auth-or { text-align: center; color: var(--text-soft); font-size: 12px; margin: 12px 0; position: relative; }
.auth-or::before, .auth-or::after { content: ""; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border); }
.auth-or::before { left: 0; } .auth-or::after { right: 0; }

/* ---------- Onboarding overlay ---------- */
.onb-overlay {
  position: fixed; inset: 0; z-index: 250; display: grid; place-items: center; padding: 24px;
  background: rgba(15,18,40,.6); backdrop-filter: blur(4px); overflow: auto;
}
.onb-card {
  width: 100%; max-width: 560px; background: var(--surface); border-radius: 20px;
  box-shadow: var(--shadow-lg); overflow: hidden; animation: fade .25s ease;

.onb-hero { padding: 26px 28px 18px; background: linear-gradient(135deg, rgba(99,102,241,.14), rgba(23,185,120,.10)); }
.onb-hero .step-dots { display: flex; gap: 7px; margin-bottom: 14px; }
.onb-hero .step-dots i { width: 26px; height: 5px; border-radius: 3px; background: var(--border); }
.onb-hero .step-dots i.on { background: linear-gradient(90deg, var(--grad-start), var(--grad-end)); }

.onb-foot { display: flex; align-items: center; gap: 10px; padding: 16px 28px; border-top: 1px solid var(--border); }
.onb-foot .spacer { flex: 1; }
.onb-feature { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px dashed var(--border); }

.onb-feature .fi { font-size: 20px; width: 26px; text-align: center; }
.onb-feature .ft { font-weight: 700; font-size: 14px; }

/* ---------- User chip (sidebar) ---------- */

<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="scrim" id="scrim"></div>
  <main class="main">
    <header class="topbar" id="topbar"></header>
    <section class="content" id="content"></section>
  </main>
</div>
<script>
/* assets/js/helpers.js */
/* ============================================================
   RankPilot AI — Shared helpers
   Global namespace: window.RP = { data, views, ui, fmt, ... }
   All view modules read RP.data and use RP.ui.* helpers.
   Load order: helpers.js -> data.js -> views/*.js -> app.js
   ============================================================ */
window.RP = window.RP || { data: {}, views: {}, ui: {} };

(function (RP) {
  'use strict';

  /* ---- number / text formatting ---- */
  RP.fmt = {
    n: function (v) {
      if (v === null || v === undefined || v === '') return '—';
      return Number(v).toLocaleString('en-US');
    },
    pct: function (v, d) { return (d != null ? Number(v).toFixed(d) : v) + '%'; },
    baht: function (v) { return '฿' + Number(v).toLocaleString('en-US'); },
    clamp: function (v, a, b) { return Math.max(a, Math.min(b, v)); }
  };

  /* ---- html escape ---- */
  RP.esc = function (s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  };

  /* ---- component builders (return HTML strings) ---- */
  var ui = RP.ui;

  ui.pageHead = function (o) {
    return '<div class="page-head">' +
      (o.eyebrow ? '<div class="eyebrow">' + RP.esc(o.eyebrow) + '</div>' : '') +
      '<h1>' + RP.esc(o.title) + '</h1>' +
      (o.desc ? '<p>' + o.desc + '</p>' : '') +
      '<div class="accent-bar"></div></div>';
  };

  ui.kpi = function (o) {
    var cls = o.tone === 'pos' ? 'pos' : (o.tone === 'brand' ? 'brand' : '');
    return '<div class="kpi"><div class="k-label">' + RP.esc(o.label) + '</div>' +
      '<div class="k-value ' + cls + '">' + o.value + '</div>' +
      (o.foot ? '<div class="k-foot">' + o.foot + '</div>' : '') + '</div>';
  };

  ui.badge = function (text, tone, dot) {
    return '<span class="badge ' + (tone || '') + (dot ? ' dot' : '') + '">' + text + '</span>';
  };

  ui.card = function (o) {
    var head = '';
    if (o.title) {
      head = '<div class="card-head"><h3>' + RP.esc(o.title) + '</h3>' +
        (o.sub ? '<span class="sub">' + RP.esc(o.sub) + '</span>' : '') +
        '<span class="spacer"></span>' + (o.action || '') + '</div>';
    }
    return '<div class="card ' + (o.cls || '') + '">' + head +
      '<div class="' + (o.flush ? '' : 'card-pad') + '">' + (o.body || '') + '</div></div>';
  };

  ui.bar = function (pct, tone) {
    return '<div class="bar ' + (tone || '') + '"><span style="width:' +
      RP.fmt.clamp(pct, 0, 100) + '%"></span></div>';
  };

  ui.trend = function (dir, txt) {
    if (dir === 'up') return '<span class="trend up">▲ ' + RP.esc(txt) + '</span>';
    if (dir === 'down') return '<span class="trend down">▼ ' + RP.esc(txt) + '</span>';
    return '<span class="trend same">– ' + RP.esc(txt) + '</span>';
  };

  ui.scorePill = function (score) {
    var c = score >= 70 ? 'hi' : (score >= 45 ? 'mid' : 'low');
    return '<span class="score-pill ' + c + '">' + score + '</span>';
  };

  // opportunity score -> difficulty label
  ui.diffLabel = function (kd) {
    if (kd <= 30) return { t: 'แข่งขันต่ำ', c: 'green' };
    if (kd <= 55) return { t: 'แข่งขันกลาง', c: 'amber' };
    return { t: 'แข่งขันสูง', c: 'red' };
  };

  /* ---- sparkline (inline svg) ---- */
  ui.spark = function (values, opts) {
    opts = opts || {};
    var w = opts.w || 120, h = opts.h || 34, pad = 3;
    var min = Math.min.apply(null, values), max = Math.max.apply(null, values);
    var span = (max - min) || 1;
    var step = (w - pad * 2) / (values.length - 1);
    var pts = values.map(function (v, i) {
      var x = pad + i * step;
      var y = h - pad - ((v - min) / span) * (h - pad * 2);
      return x.toFixed(1) + ',' + y.toFixed(1);
    });
    var color = opts.color || 'var(--brand-600)';
    var last = pts[pts.length - 1].split(',');
    return '<svg class="spark" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
      '<polyline fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="' + pts.join(' ') + '"/>' +
      '<circle cx="' + last[0] + '" cy="' + last[1] + '" r="2.6" fill="' + color + '"/></svg>';
  };

  /* ---- vertical bar chart ---- */
  ui.vbars = function (items) { // items: [{cap, val, max, label}]
    var max = Math.max.apply(null, items.map(function (i) { return i.max || i.val; }));
    return '<div class="vbars">' + items.map(function (i) {
      var pct = (i.val / (max || 1)) * 100;
      return '<div class="col"><div class="val">' + (i.label || i.val) + '</div>' +
        '<div class="bar-v" style="height:' + RP.fmt.clamp(pct, 2, 100) + '%"></div>' +
        '<div class="cap">' + RP.esc(i.cap) + '</div></div>';
    }).join('') + '</div>';
  };

  /* ---- modal ---- */
  var modalEl = null;
  ui.modal = function (o) {
    ui.closeModal();
    modalEl = document.createElement('div');
    modalEl.className = 'modal-back';
    modalEl.innerHTML =
      '<div class="modal" style="max-width:' + (o.width || 720) + 'px" role="dialog" aria-modal="true">' +
      '<div class="modal-head"><div><h3>' + o.title + '</h3>' +
      (o.sub ? '<div class="sub">' + o.sub + '</div>' : '') + '</div>' +
      '<button class="icon-btn modal-close" aria-label="ปิด">✕</button></div>' +
      '<div class="modal-body">' + o.body + '</div></div>';
    document.body.appendChild(modalEl);
    modalEl.querySelector('.modal-close').onclick = ui.closeModal;
    modalEl.onclick = function (e) { if (e.target === modalEl) ui.closeModal(); };
    requestAnimationFrame(function () { modalEl.classList.add('open'); });
    document.addEventListener('keydown', escClose);
  };
  function escClose(e) { if (e.key === 'Escape') ui.closeModal(); }
  ui.closeModal = function () {
    if (!modalEl) return;
    var el = modalEl; modalEl = null;
    el.classList.remove('open');
    document.removeEventListener('keydown', escClose);
    setTimeout(function () { el.remove(); }, 180);
  };

  /* ---- toast ---- */
  ui.toast = function (msg, ms) {
    var wrap = document.querySelector('.toast-wrap');
    if (!wrap) { wrap = document.createElement('div'); wrap.className = 'toast-wrap'; document.body.appendChild(wrap); }
    var t = document.createElement('div'); t.className = 'toast'; t.innerHTML = msg;
    wrap.appendChild(t);
    setTimeout(function () { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(function () { t.remove(); }, 320); }, ms || 2400);
  };

  /* ---- small helpers ---- */
  RP.by = function (arr, key, val) { return arr.filter(function (x) { return x[key] === val; }); };
  RP.sum = function (arr, f) { return arr.reduce(function (a, x) { return a + f(x); }, 0); };

})(window.RP);

</script>

<script>
/* assets/js/api.js */
/* ============================================================
   RankPilot AI — API client (เชื่อม frontend ↔ backend FastAPI)
   โหมด Live: เมื่อเปิด + ตั้ง base URL ของ backend แล้ว view จะดึงข้อมูลจริง
   ค่าเริ่มต้น = ปิด (ใช้ข้อมูลจำลอง) เพื่อให้เปิดไฟล์เฉย ๆ ก็ยังทำงาน
   ============================================================ */
(function (RP) {
  'use strict';
  var LS_BASE = 'rp-api-base', LS_LIVE = 'rp-live';
  function ls(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  function save(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

  var api = RP.api = {
    base: (ls(LS_BASE) || 'http://localhost:8000').replace(/\/+$/, ''),
    live: ls(LS_LIVE) === '1',
    token: ls('rp-token') || '',

    setBase: function (u) { api.base = (u || '').trim().replace(/\/+$/, ''); save(LS_BASE, api.base); },
    setLive: function (on) { api.live = !!on; save(LS_LIVE, on ? '1' : '0'); },
    setToken: function (t) { api.token = t || ''; if (t) save('rp-token', t); else { try { localStorage.removeItem('rp-token'); } catch (e) {} } },
    enabled: function () { return !!(api.live && api.base && typeof fetch === 'function'); },
    reachable: function () { return !!(api.base && typeof fetch === 'function'); },

    _headers: function () {
      var h = { 'Content-Type': 'application/json' };
      if (api.token) h['Authorization'] = 'Bearer ' + api.token;
      return h;
    },
    _get: function (path) { return fetch(api.base + path, { headers: api._headers() }).then(chk); },
    _post: function (path, body) {
      return fetch(api.base + path, { method: 'POST', headers: api._headers(), body: JSON.stringify(body) }).then(chk);
    },

    health: function () { return api._get('/health'); },
    integrations: function () { return api._get('/api/integrations'); },
    rankCheck: function (keyword, domain) { return api._post('/api/rank/check', { keyword: keyword, domain: domain }); },
    gsc: function (siteUrl, days) { return api._post('/api/gsc/summary', { site_url: siteUrl, days: days || 28 }); },
    citation: function (questions, brandTerms, domain, engines) {
      return api._post('/api/citation/sample', { questions: questions, brand_terms: brandTerms, domain: domain, engines: engines || ['openai', 'gemini', 'perplexity'] });
    },
    generate: function (topic, fmt, words) { return api._post('/api/content/generate', { topic: topic, fmt: fmt || 'บทความยาว', words: words || 1500 }); },
    publish: function (o) { return api._post('/api/publish', o); },
    mine: function (seed) { return api._post('/api/mine', { seed: seed }); },

    // ---- Auth (JWT จริง) ----
    register: function (email, password, name) { return api._post('/api/auth/register', { email: email, password: password, name: name || '' }); },
    signin: function (email, password) { return api._post('/api/auth/login', { email: email, password: password }); },
    me: function () { return api._get('/api/auth/me'); },
    // ---- Projects (DB จริง) ----
    projects: function () { return api._get('/api/projects'); },
    createProject: function (o) { return api._post('/api/projects', o); }
  };

  function chk(r) {
    if (!r.ok) {
      return r.json().catch(function () { return {}; }).then(function (j) {
        throw new Error(j.detail || ('HTTP ' + r.status));
      });
    }
    return r.json();
  }

  // helper สำหรับ view: เรียก backend พร้อม toast error อัตโนมัติ
  RP.live = function (promise, onOk) {
    if (!api.enabled()) { RP.ui.toast('เปิด "โหมด Live" + รัน backend ในหน้า ⚙️ การตั้งค่า ก่อนครับ'); return; }
    RP.ui.toast('กำลังดึงข้อมูลจริงจาก backend…');
    promise.then(onOk).catch(function (e) {
      RP.ui.toast('เชื่อม backend ไม่ได้: ' + RP.esc(e.message || String(e)));
    });
  };

})(window.RP);

</script>
<script>
/* assets/js/onboard.js */
/* ============================================================
   RankPilot AI — โหมดใช้งานจริง: เข้าสู่ระบบ + Onboarding ตามลำดับ
   (เดโม: ระบบสมาชิกจำลองด้วย localStorage — ยังไม่เชื่อม auth จริง)
   ============================================================ */
(function (RP) {
  'use strict';
  var esc = RP.esc, ui = RP.ui;
  function lget(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  function lset(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function ldel(k) { try { localStorage.removeItem(k); } catch (e) {} }

  RP.auth = {
    user: function () { try { return JSON.parse(lget('rp-user') || 'null'); } catch (e) { return null; } },
    login: function (email) { lset('rp-user', JSON.stringify({ email: email })); },
    logout: function () { ldel('rp-user'); },
    onboarded: function () { return lget('rp-onboarded') === '1'; },
    setOnboarded: function () { lset('rp-onboarded', '1'); }
  };

  /* ---------- หน้าเข้าสู่ระบบ ---------- */
  RP.showLogin = function (onSuccess) {
    var mode = 'login';
    var el = document.createElement('div');
    el.className = 'auth-screen'; el.id = 'authScreen';
    function render() {
      el.innerHTML =
        '<div class="auth-card">' +
        '<div class="auth-brand"><div class="logo">R</div><div class="name">Rank<span>Pilot</span> AI</div></div>' +
        '<div class="auth-tabs"><button data-m="login" class="' + (mode === 'login' ? 'on' : '') + '">เข้าสู่ระบบ</button>' +
        '<button data-m="signup" class="' + (mode === 'signup' ? 'on' : '') + '">สมัครใช้งาน</button></div>' +
        '<h2>' + (mode === 'login' ? 'ยินดีต้อนรับกลับมา 👋' : 'เริ่มใช้ RankPilot AI') + '</h2>' +
        '<div class="sub">' + (mode === 'login' ? 'เข้าสู่ระบบเพื่อจัดการโปรเจ็ค AEO + SEO ของคุณ' : 'สมัครเพื่อดันเว็บให้ติดทั้ง Google และ AI Search') + '</div>' +
        (mode === 'signup' ? field('ชื่อ / บริษัท', 'text', 'au_name', 'เช่น คลินิกความงาม ABC') : '') +
        field('อีเมล', 'email', 'au_email', 'you@example.com') +
        field('รหัสผ่าน', 'password', 'au_pass', '••••••••') +
        '<button class="btn btn-primary btn-block" id="au_submit" style="margin-top:6px">' + (mode === 'login' ? 'เข้าสู่ระบบ' : 'สมัครและเริ่มใช้งาน') + '</button>' +
        '<div class="auth-or">หรือ</div>' +
        '<button class="btn btn-block" id="au_demo">🚀 ทดลองใช้ทันที (บัญชีเดโม)</button>' +
        '<div class="auth-foot">เดโม — ระบบสมาชิกยังเป็นแบบจำลอง ข้อมูลเก็บในเบราว์เซอร์นี้เท่านั้น</div>' +
        '</div>';
      Array.prototype.forEach.call(el.querySelectorAll('.auth-tabs button'), function (b) {
        b.onclick = function () { mode = b.getAttribute('data-m'); render(); };
      });
      el.querySelector('#au_submit').onclick = submit;
      el.querySelector('#au_demo').onclick = function () { finish('demo@rankpilot.ai'); };
      var pass = el.querySelector('#au_pass');
      pass.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    }
    function field(label, type, id, ph) {
      return '<div class="auth-field"><label for="' + id + '">' + esc(label) + '</label>' +
        '<input id="' + id + '" type="' + type + '" placeholder="' + esc(ph) + '"></div>';
    }
    function submit() {
      var email = (el.querySelector('#au_email').value || '').trim();
      if (!email || email.indexOf('@') < 0) { RP.ui.toast('กรุณากรอกอีเมลให้ถูกต้อง'); return; }
      var pass = (el.querySelector('#au_pass').value || '');
      var nameEl = el.querySelector('#au_name');
      var name = nameEl ? nameEl.value : '';
      if (RP.api && RP.api.reachable() && pass) {
        RP.ui.toast('กำลังเข้าสู่ระบบ…');
        var p = mode === 'signup' ? RP.api.register(email, pass, name) : RP.api.signin(email, pass);
        p.then(function (res) { RP.api.setToken(res.token); finish((res.user && res.user.email) || email); })
          .catch(function (e) {
            var msg = e.message || '';
            if (/Failed to fetch|NetworkError|load failed|DATABASE_URL|503/i.test(msg)) {
              RP.ui.toast('ต่อ backend ไม่ได้ — เข้าสู่โหมดเดโม (ออฟไลน์)'); finish(email);
            } else { RP.ui.toast(RP.esc(msg)); }
          });
      } else { finish(email); }
    }
    function finish(email) {
      RP.auth.login(email);
      el.style.opacity = '0'; el.style.transition = 'opacity .2s';
      setTimeout(function () { el.remove(); if (onSuccess) onSuccess(); }, 180);
    }
    document.body.appendChild(el);
    render();
  };

  /* ---------- Onboarding (ตามลำดับ) ---------- */
  RP.showOnboarding = function () {
    var step = 0;
    var STEPS = [
      { ic: '🎉', h: 'ยินดีต้อนรับสู่ RankPilot AI', p: 'แพลตฟอร์มที่ดันเว็บของคุณให้ "ติดคำตอบ" ทั้งบน Google และ AI Search อัตโนมัติ มาตั้งค่า 3 ขั้นง่าย ๆ กัน', body: welcomeBody },
      { ic: '🔌', h: 'ขั้นที่ 1 — เชื่อมต่อ', p: 'เชื่อม API ที่จำเป็นก่อนระบบจะวัดผลได้จริง (ตั้งภายหลังในหน้าการตั้งค่าได้)', body: connectBody },
      { ic: '🗂️', h: 'ขั้นที่ 2 — โปรเจ็คแรกของคุณ', p: 'ใส่เว็บ/ธุรกิจที่อยากดัน — หรือใช้โปรเจ็คตัวอย่างเพื่อดูระบบก่อน', body: projectBody },
      { ic: '✅', h: 'พร้อมแล้ว!', p: 'ตั้งค่าเรียบร้อย เข้าสู่แดชบอร์ดเพื่อเริ่มวงจร AEO + SEO อัตโนมัติได้เลย', body: doneBody }
    ];
    var el = document.createElement('div'); el.className = 'onb-overlay'; el.id = 'onbOverlay';
    function dots() { return '<div class="step-dots">' + STEPS.map(function (_, i) { return '<i class="' + (i <= step ? 'on' : '') + '"></i>'; }).join('') + '</div>'; }
    function render() {
      var s = STEPS[step];
      el.innerHTML =
        '<div class="onb-card"><div class="onb-hero">' + dots() +
        '<div class="ic">' + s.ic + '</div><h2>' + esc(s.h) + '</h2><p>' + esc(s.p) + '</p></div>' +
        '<div class="onb-body">' + s.body() + '</div>' +
        '<div class="onb-foot">' +
        (step > 0 ? '<button class="btn" id="onb_back">ย้อนกลับ</button>' : '<button class="btn btn-ghost" id="onb_skip">ข้ามการแนะนำ</button>') +
        '<span class="spacer"></span>' +
        '<button class="btn btn-primary" id="onb_next">' + (step === STEPS.length - 1 ? 'เข้าสู่แดชบอร์ด →' : 'ถัดไป') + '</button>' +
        '</div></div>';
      var back = el.querySelector('#onb_back'); if (back) back.onclick = function () { step--; render(); };
      var skip = el.querySelector('#onb_skip'); if (skip) skip.onclick = done;
      el.querySelector('#onb_next').onclick = function () {
        if (step === STEPS.length - 1) { done(); return; }
        step++; render();
      };
    }
    function done() {
      RP.auth.setOnboarded();
      el.style.opacity = '0'; el.style.transition = 'opacity .2s';
      setTimeout(function () { el.remove(); }, 180);
      RP.go('dashboard');
    }
    document.body.appendChild(el);
    render();

    function welcomeBody() {

<script>
/* assets/js/views/dashboard.js */
/* ============================================================

(function (RP) {

  function clusterTable() {

  function portfolioCard() {

    }).join('');
    return ui.card({

    });

  function reDash() { var f = RP.views.dashboard(); var c = document.getElementById('content'); c.innerHTML = '<div class="view">' + f.html + '</div>'; f.mount(c); }

  RP.views.dashboard = function () {

      '<div class="soft small">' + esc(p.domain) + ' · โหมด ' + (p.mode === 'auto' ? 'Full-Auto' : 'Auto + Human Approve') + '</div></div>' +

    var kpiGrid = '<div class="grid grid-4 mb">' +
      RP.data.kpis.map(function (k) { return ui.kpi(k); }).join('') + '</div>';

    var loopCard = ui.card({

    var tableCard = ui.card({

      flush: true, cls: 'mb',
      action: '<button class="btn btn-sm" id="goM5">ดูรายงานอันดับ →</button>',
      body: clusterTable()

    var twoCol = '<div class="grid mb" style="grid-template-columns:1.5fr 1fr">' +
      ui.card({ title: 'AI Citation Share of Voice', sub: 'ส่วนแบ่งการถูกอ้างอิงบน AI เทียบคู่แข่ง', body: sovPanel() }) +
      ui.card({ title: 'รายงานสัปดาห์นี้ (M6)', sub: 'สรุปอัตโนมัติจาก Learning Loop', body: weeklyPanel() }) +
      '</div>';

    var factStrip = '<div class="grid grid-4">' + RP.data.facts.map(function (f) {
      return '<div class="card card-pad center"><div class="bb" style="font-size:24px;color:var(--purple-700)">' + esc(f.v) + '</div>' +
        '<div class="soft small" style="margin-top:4px">' + esc(f.d) + '</div></div>';

    var html =
      ui.pageHead({ eyebrow: 'RankPilot AI — Dashboard หลัก', title: 'แดชบอร์ดหลัก',
        desc: 'ภาพรวมทุกคลัสเตอร์ในโปรเจ็คเดียว — บทความที่เผยแพร่ อันดับบน Google และการถูก AI อ้างอิง พร้อมสถานะของวงจรอัตโนมัติแต่ละคลัสเตอร์' }) +

<script>
/* assets/js/views/m1.js */
/* ============================================================
   View: M1 — Question & Keyword Intelligence (ขุดโอกาส)
   ตามโครงการ (หน้า 4):
   - กรอกหัวข้อธุรกิจ/สินค้า → AI ขุด "คำถามจริงที่คนถาม" จากหลายแหล่ง
     (Google PAA, Google Suggest, Pantip, Reddit, คอมเมนต์โซเชียล, Prompt Mining)
   - จัดกลุ่มเป็น Topic Cluster อัตโนมัติ: หัวข้อแม่ (Pillar) + คำถามลูก (Cluster)
     พร้อมประเมินความยาก/โอกาสของแต่ละคำ
   - ชี้เป้า "คำถามที่ AI ยังตอบได้ไม่ดี/ยังไม่มีแหล่งภาษาไทย" = โอกาสติด Citation ง่ายที่สุด
   ============================================================ */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  var state = { seed: 'ครีมกันแดด', cluster: null };

  /* ---- stable pseudo-random from string ---- */
  function hash(s) {
    var h = 2166136261 >>> 0;
    for (var i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }
  function rnd(s, mod) { return hash(s) % mod; }

  /* ---- ขุดคำถาม + จัดกลุ่ม Topic Cluster สำหรับหัวข้อแม่ (Pillar) ---- */
  function mine(seed) {
    seed = (seed || '').trim() || 'ครีมกันแดด';
    var srcs = RP.data.m1.sources;
    var questions = RP.data.m1.questionTemplates.map(function (t) {
      var q = t.replace('{kw}', seed);
      var kd = 16 + rnd(q, 66);                       // ความยาก 16–81
      var vol = 260 + rnd(q + 'v', 9400);             // ปริมาณค้นหา/เดือน
      var opp = fmt.clamp(Math.round(97 - kd * 0.82 + rnd(q + 'o', 20)), 20, 99);
      var aiGap = opp >= 70 && rnd(q + 'g', 100) < 62; // AI ยังตอบไม่ดี/ไม่มีแหล่งไทย
      return { q: q, kd: kd, vol: vol, opp: opp, aiGap: aiGap, source: srcs[rnd(q + 's', srcs.length)] };
    });
    questions.sort(function (a, b) { return b.opp - a.opp; });
    return { pillar: seed, questions: questions };
  }

  /* ---- สรุปตัวเลข ---- */
  function summaryKpis() {
    var c = state.cluster;
    var avgKd = Math.round(RP.sum(c.questions, function (q) { return q.kd; }) / c.questions.length);
    var gaps = c.questions.filter(function (q) { return q.aiGap; }).length;
    var vol = RP.sum(c.questions, function (q) { return q.vol; });
    return '<div class="grid grid-4 mb">' +
      ui.kpi({ label: 'คำถามที่ขุดได้', value: fmt.n(c.questions.length), foot: 'จาก ' + RP.data.m1.sources.length + ' แหล่ง' }) +
      ui.kpi({ label: 'โอกาสทอง (AI Gap)', value: fmt.n(gaps), tone: 'brand', foot: 'AI ยังตอบได้ไม่ดี/ไม่มีแหล่งไทย' }) +
      ui.kpi({ label: 'ปริมาณค้นหารวม', value: fmt.n(vol), foot: 'ครั้ง/เดือน (โดยประมาณ)' }) +
      ui.kpi({ label: 'ความยากเฉลี่ย (KD)', value: avgKd, tone: (avgKd <= 40 ? 'pos' : ''), foot: ui.diffLabel(avgKd).t }) +
      '</div>';
  }

  /* ---- แถวคำถามลูก (Cluster) ---- */
  function qRow(q) {
    var d = ui.diffLabel(q.kd);
    var gap = q.aiGap ? ' <span class="badge amber" title="AI ยังตอบได้ไม่ดี/ไม่มีแหล่งไทย">🎯 โอกาสทอง</span>' : '';
    return '<div class="kw-row">' +
      '<span class="badge purple nowrap">Cluster</span>' +
      '<div class="kw"><div class="txt">' + esc(q.q) + gap + '</div>' +
      '<div class="meta">' +
        '<span>🔍 ~' + fmt.n(q.vol) + '/เดือน</span>' +
        '<span class="badge ' + d.c + '">' + d.t + ' · KD ' + q.kd + '</span>' +
        '<span>โอกาส ' + ui.scorePill(q.opp) + '</span>' +
        '<span class="soft">ขุดจาก: ' + esc(q.source) + '</span>' +
      '</div></div>' +
      '<button class="btn btn-sm q-detail" data-q="' + esc(q.q) + '">รายละเอียด</button>' +
      '</div>';
  }

  function clusterCard() {
    var c = state.cluster;
    var rows = c.questions.map(qRow).join('');
    return '<div class="intent-col mb">' +
      '<div class="intent-head rec">' +
      '<span class="ic">🗂️</span>' +
      '<div><div class="h">Topic Cluster: ' + esc(c.pillar) + '</div>' +
      '<div class="c">หัวข้อแม่ (Pillar) + คำถามลูก (Cluster) ' + c.questions.length + ' คำถาม จัดกลุ่มอัตโนมัติ</div></div>' +
      '<span class="count">Pillar</span></div>' +
      '<div>' + rows + '</div>' +
      '</div>';
  }

  function sourcesCard() {
    var chips = RP.data.m1.sources.map(function (s) { return '<span class="chip">🌐 ' + esc(s) + '</span>'; }).join('');
    return ui.card({
      title: 'แหล่งขุดคำถาม (Question Mining)', sub: 'ระบบรวบรวมคำถามจริงที่คนถามจากหลายแหล่ง',
      body: '<div class="tag-list mb">' + chips + '</div>' +
        '<div class="hint">🎯 ชี้เป้า: <b>คำถามที่ AI ยังตอบได้ไม่ดี หรือยังไม่มีแหล่งภาษาไทยอ้างอิง</b> = โอกาสติด Citation ง่ายที่สุด (ตามกลยุทธ์หน้า 5 ของโครงการ)'
    });
  }

  function howCard() {
    return ui.card({
      title: 'M1 ทำงานอย่างไร', sub: 'ขุดคำถามจริง → จัดกลุ่ม Topic Cluster → ชี้โอกาส',
      body:
        '<div class="grid grid-3" style="gap:14px">' +
        howStep('1', '🔎', 'ขุดคำถามจริง', 'รวบรวมจาก Google People Also Ask, Google Suggest, Pantip, Reddit, คอมเมนต์โซเชียล และจำลองการถาม AI (Prompt Mining)') +
        howStep('2', '🗂️', 'จัดกลุ่ม Topic Cluster', 'จัดเป็นหัวข้อแม่ (Pillar) + คำถามลูก (Cluster) อัตโนมัติ พร้อมประเมินความยาก/โอกาสของแต่ละคำ') +
        howStep('3', '🎯', 'ชี้เป้าโอกาสทอง', 'ไฮไลต์คำถามที่ AI ยังตอบได้ไม่ดี/ไม่มีแหล่งไทย — สร้างก่อนได้เปรียบ ติด Citation ง่ายสุด') +
        '</div>'
    });
  }

  function howStep(n, ic, t, d) {
    return '<div class="panel"><div class="panel-body">' +
      '<div class="row gap-s" style="margin-bottom:6px"><span style="font-size:20px">' + ic + '</span>' +
      '<span class="badge purple">ขั้นที่ ' + n + '</span></div>' +
      '<div class="bb" style="margin-bottom:3px">' + esc(t) + '</div>' +
      '<div class="soft small">' + esc(d) + '</div></div></div>';
  }

  /* ---- modal: รายละเอียดคำถาม (ขุดจากไหน / ทำไมเป็นโอกาส / รูปแบบที่แนะนำ) ---- */
  function openDetail(qText) {
    var q = state.cluster.questions.filter(function (x) { return x.q === qText; })[0];
    if (!q) return;
    var variations = [
      qText,
      qText + ' pantip',
      qText.replace(state.cluster.pillar, state.cluster.pillar + ' 2026'),
      'อยากรู้ ' + qText
    ];
    var fmts = RP.data.m2.formats;
    var recFmt = fmts[rnd(qText + 'f', fmts.length)];
    var d = ui.diffLabel(q.kd);
    var body =
      '<div class="grid grid-2 mb">' +
      ui.card({ title: 'ข้อมูลคีย์เวิร์ด', body:
        '<div class="list-row"><div class="grow t small">ปริมาณค้นหา</div><div class="bb">~' + fmt.n(q.vol) + '/เดือน</div></div>' +
        '<div class="list-row"><div class="grow t small">ความยาก (KD)</div><div>' + ui.badge(d.t + ' · ' + q.kd, d.c) + '</div></div>' +
        '<div class="list-row"><div class="grow t small">คะแนนโอกาส</div><div>' + ui.scorePill(q.opp) + '</div></div>' +
        '<div class="list-row"><div class="grow t small">ขุดจากแหล่ง</div><div class="b">' + esc(q.source) + '</div></div>'
      }) +
      ui.card({ title: 'คำแนะนำการผลิต', body:
        '<div class="small" style="margin-bottom:8px">รูปแบบคอนเทนต์ที่แนะนำ:</div>' +
        '<div class="mb"><span class="badge blue">' + esc(recFmt) + '</span></div>' +
        (q.aiGap
          ? '<div class="ok-box">🎯 <b>โอกาสทอง</b> — AI ยังตอบคำถามนี้ได้ไม่ดีหรือยังไม่มีแหล่งภาษาไทยที่ดี ถ้าเราสร้างคอนเทนต์คุณภาพก่อน มีโอกาสถูก AI หยิบไปอ้างอิงสูง</div>'
          : '<div class="hint">คำถามนี้มีคู่แข่งอยู่บ้าง เน้นทำให้ครบและสดใหม่กว่าเดิมเพื่อแย่ง Citation</div>')
      }) +
      '</div>' +
      ui.card({ title: 'รูปแบบคำถามที่พบ (People Also Ask / Suggest)', body:
        variations.map(function (v) { return '<div class="list-row"><span>💬</span><div class="grow t small">' + esc(v) + '</div></div>'; }).join('')
      });
    ui.modal({ title: 'รายละเอียดคำถาม', sub: esc(qText), width: 760, body: body });
  }

  /* ---- main view ---- */
  RP.views.m1 = function () {
    state.cluster = mine(state.seed);

    var searchCard =
      '<div class="card mb"><div class="card-pad">' +
      '<div class="row wrap" style="gap:10px">' +
      '<div class="field" style="flex:1;min-width:240px"><span class="ico">🔎</span>' +
      '<input id="seedInput" placeholder="กรอกหัวข้อธุรกิจ / สินค้า / บริการ เช่น ครีมกันแดด" value="' + esc(state.seed) + '"></div>' +
      '<button class="btn btn-primary" id="genBtn">ขุดคำถาม & จัดกลุ่ม (Auto)</button>' +
      '</div>' +
      '<div class="row wrap" style="gap:8px;margin-top:12px">' +
      '<span class="soft small">ตัวอย่าง:</span>' +
      RP.data.seedExamples.map(function (s) { return '<button class="chip seed-eg" data-seed="' + esc(s) + '">' + esc(s) + '</button>'; }).join('') +
      '</div></div></div>';

    var html =
      ui.pageHead({ eyebrow: 'M1 · Question & Keyword Intelligence', title: 'ขุดคำถาม & คีย์เวิร์ด',
        desc: 'กรอกหัวข้อธุรกิจ/สินค้าเพียงหัวข้อเดียว ระบบจะขุด "คำถามจริงที่คนถาม" จากหลายแหล่ง แล้วจัดกลุ่มเป็น <b>Topic Cluster</b> อัตโนมัติ (หัวข้อแม่ Pillar + คำถามลูก Cluster) พร้อมประเมินความยาก/โอกาส และชี้เป้าคำถามที่ AI ยังตอบได้ไม่ดี' }) +
      searchCard +
      liveMineCard() +
      '<div id="mineOut">' + summaryKpis() + '<div class="grid mb" style="grid-template-columns:1.6fr 1fr">' +
        clusterCard() + sourcesCard() + '</div></div>' +
      howCard();

    return {
      html: html,
      mount: function (root) {
        function refresh() {
          root.querySelector('#mineOut').innerHTML =
            summaryKpis() + '<div class="grid mb" style="grid-template-columns:1.6fr 1fr">' + clusterCard() + sourcesCard() + '</div>';
          wireDetails(root);
        }
        function doGen() {
          var v = root.querySelector('#seedInput').value.trim();
          if (!v) { RP.ui.toast('กรุณากรอกหัวข้อก่อน'); return; }
          state.seed = v; state.cluster = mine(v);
          refresh();
          RP.ui.toast('ขุดคำถามสำหรับ <b>"' + esc(v) + '"</b> แล้ว — จัดกลุ่ม Topic Cluster เรียบร้อย ✓');
        }
        root.querySelector('#genBtn').onclick = doGen;
        root.querySelector('#seedInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') doGen(); });
        Array.prototype.forEach.call(root.querySelectorAll('.seed-eg'), function (b) {
          b.onclick = function () { root.querySelector('#seedInput').value = b.getAttribute('data-seed'); doGen(); };
        });
        var mn = root.querySelector('#m1_mine');
        if (mn) mn.onclick = function () {
          var v = (root.querySelector('#seedInput').value || '').trim() || state.seed;
          RP.live(RP.api.mine(v), mineModal);
        };
        wireDetails(root);
      }
    };
  };

  function liveMineCard() {
    return ui.card({
      title: 'โหมด Live — ขุดคำถามจริง', sub: 'ดึงจาก Google Suggest + People Also Ask ผ่าน backend', cls: 'mb',
      action: RP.api.enabled() ? ui.badge('● Live เปิด', 'green') : ui.badge('Live ปิด', 'amber'),
      body: '<div class="row wrap" style="gap:10px"><div class="soft small" style="flex:1;min-width:200px">ใช้คีย์เวิร์ดในช่องด้านบน แล้วกดปุ่มนี้เพื่อขุด "คำถามจริงที่คนค้นบน Google"</div>' +
        '<button class="btn btn-primary" id="m1_mine">ขุดคำถามจริง (Live)</button></div>' +
        '<div class="hint" style="margin-top:10px">Google Suggest ใช้ได้ฟรี (ไม่ต้องมีคีย์) · People Also Ask ต้องมีคีย์ DataForSEO — ต้องเปิดโหมด Live + รัน backend</div>'
    });
  }

  function mineModal(res) {
    var rows = (res.questions || []).map(function (q) {
      return '<tr><td>' + (q.is_question ? ui.badge('คำถาม', 'purple') : ui.badge('คีย์เวิร์ด', '')) + '</td>' +
        '<td class="tbl-title">' + esc(q.q) + '</td><td class="soft small">' + esc(q.source) + '</td></tr>';
    }).join('');
    ui.modal({ title: 'ผลขุดคำถามจริง — ' + esc(res.pillar), sub: 'พบ ' + res.count + ' รายการ · แหล่ง: ' + (res.sources_used || []).join(', '), width: 760,
      body: '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>ประเภท</th><th>คำถาม / คีย์เวิร์ด</th><th>แหล่ง</th></tr></thead><tbody>' + rows + '</tbody></table></div>' });
  }

  function wireDetails(root) {
    Array.prototype.forEach.call(root.querySelectorAll('.q-detail'), function (b) {
      b.onclick = function () { openDetail(b.getAttribute('data-q')); };
    });
  }

})(window.RP);

</script>
<script>
/* assets/js/views/m2.js */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  function factBadge(fact) {
    if (fact === 'pass') return ui.badge('ผ่าน', 'green');
    return ui.badge('กำลังตรวจ', 'amber');
  }

  function plagBadge(plag) {
    var v = (plag == null ? 0 : plag);
    if (v < 5) return ui.badge(v + '%', 'green');
    return ui.badge(v + '%', 'amber');
  }

  function statusBadge(status) {
    if (status === 'ready') return ui.badge('พร้อมเผยแพร่', 'green');
    if (status === 'scheduled') return ui.badge('ตั้งเวลาแล้ว', 'blue');
    if (status === 'factcheck') return ui.badge('กำลัง Fact-Check', 'amber');
    return ui.badge('ฉบับร่าง', '');
  }

  function queueRow(q) {
    return '<tr>' +
      '<td><span class="bb">' + esc(q.title) + '</span>' +
        '<div class="soft small">' + esc(q.author) + '</div></td>' +
      '<td>' + ui.badge(esc(q.cluster), '') + '</td>' +
      '<td class="soft">' + esc(q.format) + '</td>' +
      '<td class="num">' + fmt.n(q.words) + '</td>' +
      '<td class="center">' + ui.scorePill(q.aeo) + '</td>' +
      '<td class="center">' + factBadge(q.fact) + '</td>' +
      '<td class="center">' + plagBadge(q.plag) + '</td>' +
      '<td class="center">' + statusBadge(q.status) + '</td>' +
    '</tr>';
  }

  function queueTable(queue) {
    if (!queue.length) {
      return '<div class="card-pad soft">ยังไม่มีบทความในคิว</div>';
    }
    var rows = '';
    for (var i = 0; i < queue.length; i++) rows += queueRow(queue[i]);
    return '<div class="tbl-wrap"><table class="tbl">' +
      '<thead><tr>' +
        '<th>บทความ</th>' +
        '<th>คลัสเตอร์</th>' +
        '<th>รูปแบบ</th>' +
        '<th class="right">จำนวนคำ</th>' +
        '<th class="center">คะแนน AEO</th>' +
        '<th class="center">Fact-Check</th>' +
        '<th class="center">ความซ้ำ</th>' +
        '<th class="center">สถานะ</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div>';
  }

  function checklistBody(list) {
    if (!list.length) return '<div class="soft">ยังไม่มีรายการตรวจสอบ</div>';
    var out = '';
    for (var i = 0; i < list.length; i++) {
      var c = list[i];
      var mark = c.on
        ? '<span class="badge green">✓</span>'
        : '<span class="soft">○</span>';
      out += '<div class="list-row">' + mark +
        '<div class="grow"><div class="t">' + esc(c.t) + '</div></div>' +
        '<div class="s">' + (c.on ? '<span class="muted small">พร้อม</span>' : '<span class="muted small">ยังไม่ผ่าน</span>') + '</div>' +
      '</div>';
    }
    return out;
  }

  function eeatBody() {
    return '' +
      '<div class="note-box purple mb">' +
        '<b>Author Persona + แหล่งอ้างอิงจริง</b><div class="soft small">' +
        'ทุกบทความผูกโปรไฟล์ผู้เขียนที่มีความเชี่ยวชาญจริง และแนบแหล่งอ้างอิงที่ระบบไปดึงมา ' +
        'เพื่อสร้างสัญญาณ E-E-A-T (ประสบการณ์ · ความเชี่ยวชาญ · ความน่าเชื่อถือ · ความไว้วางใจ)</div>' +
      '</div>' +
      '<div class="ok-box mb">' +
        '<b>AI Fact-Check ข้ามแหล่ง</b><div class="soft small">' +
        'ระบบตรวจข้อเท็จจริงอัตโนมัติโดยเทียบข้อมูลข้ามหลายแหล่ง ก่อนอนุมัติเข้าคิวเผยแพร่</div>' +
      '</div>' +
      '<div class="hint">' +
        '<b>ตรวจความซ้ำ (Plagiarism)</b> · บทความที่มีความซ้ำ ' +
        '<span class="bb">ต่ำกว่า 5%</span> จึงจะถือว่าปลอดภัยต่อการเผยแพร่' +
      '</div>';
  }

  function formatsBody(formats) {
    if (!formats.length) return '<div class="soft">ยังไม่ได้กำหนดรูปแบบคอนเทนต์</div>';
    var chips = '';
    for (var i = 0; i < formats.length; i++) {
      chips += '<span class="chip">' + esc(formats[i]) + '</span>';
    }
    return '<div class="tag-list">' + chips + '</div>';
  }

  RP.views.m2 = function () {
    var d = (RP.data && RP.data.m2) || {};
    var queue = d.queue || [];
    var formats = d.formats || [];
    var checklist = d.aeoChecklist || [];

    var total = queue.length;
    var readyCount = RP.by(queue, 'status', 'ready').length;
    var factPass = RP.by(queue, 'fact', 'pass').length;
    var avgAeo = total ? Math.round(RP.sum(queue, function (q) { return q.aeo || 0; }) / total) : 0;

    var kpis =
      ui.kpi({
        label: 'บทความในคิว',
        value: fmt.n(total),
        tone: '',
        foot: '<span class="soft">รวมทุกสถานะการผลิต</span>'
      }) +
      ui.kpi({
        label: 'พร้อมเผยแพร่',
        value: fmt.n(readyCount),
        tone: 'pos',
        foot: '<span class="soft">ผ่านทุกด่านตรวจแล้ว</span>'
      }) +
      ui.kpi({
        label: 'คะแนน AEO เฉลี่ย',
        value: total ? fmt.n(avgAeo) : '—',
        tone: 'brand',
        foot: '<span class="soft">Answer-First · โครงสร้าง · FAQ</span>'
      }) +
      ui.kpi({
        label: 'ผ่าน Fact-Check',
        value: fmt.n(factPass) + '<span class="soft"> / ' + fmt.n(total) + '</span>',
        tone: '',
        foot: '<span class="soft">ตรวจข้อเท็จจริงข้ามแหล่ง</span>'
      });

    var html =
      ui.pageHead({
        eyebrow: 'M2 · AI Content Factory',
        title: 'โรงงานคอนเทนต์',
        desc: 'ผลิตบทความตาม<b>สูตร AEO</b> — เปิดด้วยคำตอบ 40–60 คำ, โครงสร้าง H2/H3, FAQ, ตาราง, สรุปประเด็น ' +
          'พร้อมผูก Author Persona และผ่าน Fact-Check + Plagiarism ก่อนเผยแพร่'
      }) +
      liveGenCard() +
      '<div class="grid grid-4 mb">' + kpis + '</div>' +
      ui.card({
        title: 'คิวผลิตคอนเทนต์',
        sub: 'ผลิตตามสูตร AEO + Fact-Check + Plagiarism ก่อนเข้าคิวเผยแพร่',
        body: queueTable(queue),
        flush: true
      }) +
      '<div class="grid grid-2 mb">' +
        ui.card({
          title: 'เช็กลิสต์สูตร AEO',
          sub: 'องค์ประกอบที่ต้องมีในทุกบทความ',
          body: checklistBody(checklist)
        }) +
        ui.card({
          title: 'คุณภาพ & ความน่าเชื่อถือ (E-E-A-T)',
          sub: 'สร้างความไว้วางใจก่อนเผยแพร่',
          body: eeatBody()
        }) +
      '</div>' +
      ui.card({
        title: 'รูปแบบคอนเทนต์ที่รองรับ',
        sub: 'บทความยาว · หน้าเปรียบเทียบ · “X คืออะไร” · รีวิว · Listicle · Programmatic',
        body: formatsBody(formats)
      });

    return {
      html: html,
      mount: function (root) {
        var b = root.querySelector('#m2_gen');
        if (b) b.onclick = function () {
          var topic = (root.querySelector('#m2_topic').value || '').trim();
          if (!topic) { RP.ui.toast('พิมพ์หัวข้อบทความก่อนครับ'); return; }
          var fmtSel = root.querySelector('#m2_fmt');
          RP.live(RP.api.generate(topic, fmtSel ? fmtSel.value : 'บทความยาว', 1500), genModal);
        };
      }
    };
  };

  function liveGenCard() {
    var opts = RP.data.m2.formats.map(function (f) { return '<option>' + esc(f) + '</option>'; }).join('');
    return ui.card({
      title: 'โหมด Live — ผลิตบทความด้วย AI จริง', sub: 'ยิงไปที่ LLM (Claude/GPT/Gemini) ผ่าน backend', cls: 'mb',
      action: RP.api.enabled() ? ui.badge('● Live เปิด', 'green') : ui.badge('Live ปิด', 'amber'),
      body:
        '<div class="row wrap" style="gap:10px">' +
        '<div class="field" style="flex:1;min-width:240px"><span class="ico">✍️</span><input id="m2_topic" placeholder="หัวข้อบทความ เช่น ครีมกันแดดหน้าไม่วอก สำหรับผิวมัน"></div>' +
        '<select class="select" id="m2_fmt">' + opts + '</select>' +
        '<button class="btn btn-primary" id="m2_gen">ผลิตด้วย AI สด</button></div>' +
        '<div class="hint" style="margin-top:10px">ยิงไปที่ LLM จริงตามสูตร AEO (Answer-First 40–60 คำ + H2/H3 + FAQ) — ต้องเปิดโหมด Live + รัน backend + ตั้งคีย์ LLM ก่อน</div>'
    });
  }

  function genModal(res) {
    ui.modal({ title: 'บทความที่ผลิตด้วย AI (Live)', sub: 'โมเดล: ' + esc(res.provider || '') + ' · ' + esc(res.model || ''), width: 860,
      body: '<div class="note-box mb">ตัวอย่างผลลัพธ์จริงจาก LLM — พร้อมส่งต่อเข้าคิว/เผยแพร่ (M4)</div>' +
        '<div style="border:1px solid var(--border);border-radius:12px;padding:16px;max-height:52vh;overflow:auto">' + (res.html || '<span class="soft">ไม่มีเนื้อหา</span>') + '</div>' });
  }
})(window.RP);

</script>
<script>
/* assets/js/views/m3.js */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  RP.views.m3 = function () {
    var d = (RP.data && RP.data.m3) || {};
    var schema = d.schema || [];
    var llmsTxt = d.llmsTxt || {};
    var sitemap = d.sitemap || {};
    var internalLinks = d.internalLinks || {};
    var freshness = d.freshness || [];
    var audit = d.audit || [];

    var avgPct = schema.length
      ? Math.round(RP.sum(schema, function (s) { return s.pct || 0; }) / schema.length)
      : 0;

    var html = ui.pageHead({
      eyebrow: 'M3 · AEO Optimizer',
      title: 'AEO Optimizer',
      desc: 'เครื่องยนต์ติดคำตอบ — ใส่ Schema อัตโนมัติ, ดูแล llms.txt/Sitemap, สร้าง Topical Authority และรีเฟรชความสดของเนื้อหาให้ติดอันดับใน AI Answer'
    }) + '';

    // 1) KPI ROW
    html += '<div class="grid grid-4 mb">';
    html += ui.kpi({
      label: 'Schema ครอบคลุมเฉลี่ย',
      value: avgPct + '%',
      tone: 'brand',
      foot: 'ครอบคลุม ' + fmt.n(schema.length) + ' ชนิดเนื้อหา'
    });
    html += ui.kpi({
      label: 'llms.txt',
      value: fmt.n(llmsTxt.entries || 0) + ' รายการ',
      foot: 'อัปเดต ' + esc(llmsTxt.updated || '-')
    });
    html += ui.kpi({
      label: 'Sitemap URLs',
      value: fmt.n(sitemap.urls || 0),
      foot: sitemap.submitted ? 'ส่งเข้าระบบแล้ว' : 'ยังไม่ได้ส่ง'
    });
    html += ui.kpi({
      label: 'Internal Links',
      value: fmt.n(internalLinks.total || 0),
      foot: 'เฉลี่ย ' + esc(String(internalLinks.avgPerPage || 0)) + '/หน้า'
    });
    html += '</div>';

    // 2) SCHEMA COVERAGE CARD
    var schemaBody = '';
    if (schema.length) {
      schema.forEach(function (s) {
        var pct = fmt.clamp(s.pct || 0, 0, 100);
        schemaBody +=
          '<div class="list-row">' +
            '<span class="t b nowrap">' + esc(s.t) + '</span>' +
            '<div class="grow">' + ui.bar(pct) + '</div>' +
            '<span class="s right nowrap">' + fmt.n(s.pages || 0) + '/' + fmt.n(s.total || 0) +
              ' (' + pct + '%)</span>' +
          '</div>';
      });
    } else {

      cls: 'mb'
    });

    // 3) TWO-COL: files/links + technical audit
    html += '<div class="grid grid-2 mb">';

    // 3a) llms.txt · Sitemap · Internal Link
    var filesBody = '';
    filesBody +=
      '<div class="list-row">' +
        '<span class="t b">llms.txt</span>' +
        '<div class="grow s soft">อัปเดต ' + esc(llmsTxt.updated || '-') + '</div>' +

      '</div>';
    filesBody +=
      '<div class="list-row">' +
        '<span class="t b">Internal Links</span>' +
        '<div class="grow s soft">Topical Authority ภายใน Topic Cluster</div>' +

    var orphan = internalLinks.orphan || 0;
    filesBody +=
      '<div class="list-row">' +
        '<span class="t b">หน้ากำพร้า (Orphan)</span>' +
        '<div class="grow s soft">หน้าที่ยังไม่มีลิงก์ภายในชี้ถึง</div>' +
        '<span class="right">' + (orphan > 0
          ? ui.badge(fmt.n(orphan) + ' หน้า', 'amber')
          : ui.badge('0 หน้า', 'green')) + '</span>' +
      '</div>';
    html += ui.card({
      title: 'llms.txt · Sitemap · Internal Link',
      sub: 'ทำให้เว็บอ่านง่ายสำหรับ AI Crawler และสร้าง Topical Authority',
      body: filesBody
    });

    // 3b) Technical SEO Audit
    var auditBody = '';
    if (audit.length) {
      audit.forEach(function (a) {
        var mark = a.ok === true
          ? '<span class="b" style="color:var(--green,#16a34a)">✓</span>'
          : '<span class="b" style="color:var(--amber,#d97706)">⚠</span>';
        auditBody +=
          '<div class="list-row">' +
            '<span class="t b">' + esc(a.t) + '</span>' +
            '<div class="grow s soft right">' + esc(String(a.val)) + '</div>' +
            '<span class="right nowrap">' + mark + '</span>' +
          '</div>';
      });
    } else {
      auditBody = '<div class="soft small center">ยังไม่มีผล Audit</div>';
    }
    html += ui.card({
      title: 'Technical SEO Audit',
      sub: 'ตรวจอัตโนมัติ: ความเร็ว, Core Web Vitals, Mobile, Index Coverage',
      body: auditBody
    });

    html += '</div>';

    // 4) FRESHNESS ENGINE (flush table)
    var rows = '';
    if (freshness.length) {
      freshness.forEach(function (f) {
        rows +=
          '<tr>' +
            '<td>' + esc(f.title) + '</td>' +
            '<td class="num">' + esc(String(f.age)) + '</td>' +
            '<td class="center">' + ui.badge(esc(f.due), 'amber') + '</td>' +
            '<td class="right">' + ui.badge(esc(f.act), 'purple') + '</td>' +
          '</tr>';

    } else {
      rows = '<tr><td colspan="4" class="center soft">ทุกหน้ายังสดใหม่ ไม่มีหน้าที่ต้องรีเฟรช</td></tr>';
    }
    var freshBody =
      '<div class="tbl-wrap"><table class="tbl">' +
        '<thead><tr>' +
          '<th>หน้า</th>' +
          '<th class="num">อายุ</th>' +
          '<th class="center">สถานะ</th>' +
          '<th class="right">การทำงาน</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>' +
      '<div class="hint">Freshness Engine ตรวจอายุทุกหน้า หน้าไหนใกล้ครบ 3–6 เดือน ระบบจะรีเฟรชเนื้อหา/ตัวเลข/ปี พ.ศ. ให้อัตโนมัติ ' +
        'ความสดใหม่ของเนื้อหาสำคัญมากต่อการถูกอ้างอิงโดย AI — 83% ของ Citation มาจากหน้าที่อัปเดตภายใน 12 เดือน</div>';
    html += ui.card({
      title: 'Freshness Engine',
      sub: 'รีเฟรชหน้าที่ใกล้ครบ 3–6 เดือนอัตโนมัติ',
      action: ui.badge('83% ของ Citation มาจากหน้าที่อัปเดตใน 12 เดือน', 'blue'),
      body: freshBody,
      flush: true
    });

    return { html: html, mount: null };
  };
})(window.RP);

</script>
<script>
/* assets/js/views/m4.js */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  RP.views.m4 = function () {
    var d = RP.data.m4;

    function modeCard(mode, title, sub) {
      var on = d.mode === mode;
      var style = on
        ? ' style="border:2px solid var(--brand-600); background:var(--surface-2);"'
        : ' style="border:2px solid transparent;"';
      return '' +
        '<div class="panel mode-opt" data-mode="' + esc(mode) + '"' + style + ' role="button" tabindex="0">' +
          '<div class="panel-body">' +
            '<div class="row between wrap gap-s">' +
              '<span class="bb">' + esc(title) + '</span>' +
              (on ? ui.badge('เลือกอยู่', 'green') : ui.badge('แตะเพื่อเลือก', '')) +
            '</div>' +
            '<div class="s soft small">' + esc(sub) + '</div>' +
          '</div>' +
        '</div>';
    }

    function buildModes() {
      return '' +
        '<div class="grid grid-2 mb">' +
          modeCard('auto', 'Full-Auto 100%', 'ระบบเผยแพร่เองทันทีที่ผ่านเกณฑ์คุณภาพ') +
          modeCard('approve', 'Auto + Human Approve', 'ส่งเข้าคิวรออนุมัติทางไลน์/อีเมลก่อนเผยแพร่') +
        '</div>' +
        '<div class="hint">แนะนำเริ่มด้วย <b>Auto + Human Approve</b> — ปลอดภัยกว่าตามหน้าประเมินความเสี่ยง เพราะมีคนตรวจก่อนเผยแพร่จริง</div>';
    }

    // 1) โหมดเผยแพร่
    var modeCardHtml = ui.card({
      title: 'โหมดเผยแพร่',
      sub: 'เลือกวิธีนำคอนเทนต์ขึ้นเว็บ',
      body: '<div id="rp-m4-modes">' + buildModes() + '</div>'
    });

    // 2) ปลายทางที่เชื่อมต่อ
    var targetRows = (d.targets || []).map(function (t) {
      return '' +
        '<div class="list-row">' +
          '<div class="grow">' +
            '<div class="t bb">' + esc(t.name) + '</div>' +
            '<div class="s soft small">' + esc(t.type) + '</div>' +
          '</div>' +
          ui.badge(t.status, t.ok ? 'green' : 'amber') +
        '</div>';
    }).join('');
    var targetsCardHtml = ui.card({
      title: 'ปลายทางที่เชื่อมต่อ',
      sub: 'เชื่อมต่อ WordPress / Webflow / เว็บลูกค้าผ่าน API',
      body: targetRows || '<div class="soft small">ยังไม่มีปลายทางที่เชื่อมต่อ</div>'
    });

    // 3) ปฏิทินคอนเทนต์
    var calRows = (d.calendar || []).map(function (c) {
      return '' +
        '<tr>' +
          '<td class="nowrap">' + esc(c.date) + '</td>' +
          '<td class="bb">' + esc(c.title) + '</td>' +
          '<td>' + ui.badge(c.cluster, 'blue') + '</td>' +
          '<td class="num">' + esc(c.time) + '</td>' +
        '</tr>';
    }).join('');
    var calBody = '' +
      '<div class="tbl-wrap"><table class="tbl">' +
        '<thead><tr>' +
          '<th>วันที่</th><th>บทความ</th><th>คลัสเตอร์</th><th class="right">เวลา</th>' +
        '</tr></thead>' +
        '<tbody>' + (calRows || '<tr><td colspan="4" class="center soft">ยังไม่มีตารางเผยแพร่</td></tr>') + '</tbody>' +
      '</table></div>';
    var calendarCardHtml = ui.card({
      title: 'ปฏิทินคอนเทนต์ (Content Calendar)',
      sub: 'ตั้งตารางเผยแพร่ล่วงหน้าอัตโนมัติ',
      flush: true,
      body: calBody
    });

    // 4) คิวรออนุมัติ
    function approvalRows() {
      return (d.approval || []).map(function (a, i) {
        return '' +
          '<tr data-row="' + i + '">' +
            '<td>' +
              '<div class="bb">' + esc(a.title) + '</div>' +
              '<div class="soft small">' + ui.badge(a.cluster, 'purple') + '</div>' +
            '</td>' +
            '<td class="num">' + fmt.n(a.words) + ' คำ</td>' +
            '<td class="center">' + ui.scorePill(a.aeo) + '</td>' +
            '<td class="right nowrap" data-cell="act">' +
              '<button class="btn btn-green btn-sm approve" data-idx="' + i + '">✓ อนุมัติ</button> ' +
              '<button class="btn btn-sm">แก้ไข</button>' +
            '</td>' +
          '</tr>';
      }).join('');
    }
    var approvalBody = '' +
      '<div class="tbl-wrap"><table class="tbl">' +
        '<thead><tr>' +
          '<th>บทความ</th><th class="right">จำนวนคำ</th><th class="center">AEO</th><th class="right">การจัดการ</th>' +
        '</tr></thead>' +
        '<tbody>' + (approvalRows() || '<tr><td colspan="4" class="center soft">ไม่มีบทความรออนุมัติ</td></tr>') + '</tbody>' +
      '</table></div>';
    var approvalCardHtml = ui.card({
      title: 'คิวรออนุมัติ',
      sub: 'ตรวจก่อนเผยแพร่ตามโหมด Human Approve',
      flush: true,
      action: ui.badge('รออนุมัติ ' + fmt.n(d.pendingCount) + ' บทความ', 'amber'),
      body: approvalBody
    });

    // 5) แจ้ง Index
    var pingRows = (d.indexPings || []).map(function (p) {
      return '' +
        '<div class="list-row">' +
          '<div class="grow">' +
            '<div class="t">' + esc(p.url) + '</div>' +
            '<div class="s soft small">' + esc(p.ts) + '</div>' +
          '</div>' +
          (p.ok
            ? '<span class="bb" style="color:var(--green-600, #16a34a);">✓</span>'
            : ui.badge('รอ', 'amber')) +
        '</div>';
    }).join('');
    var indexCardHtml = ui.card({
      title: 'แจ้ง Index (IndexNow / Sitemap Ping)',
      sub: 'แจ้ง Google ทันทีที่เผยแพร่ผ่าน Indexing / Sitemap Ping และ IndexNow',
      body: (pingRows || '<div class="soft small">ยังไม่มีการแจ้ง Index</div>') +
        '<div class="note-box mb-l" style="margin-top:12px;">แจ้ง Google ผ่าน Indexing/Sitemap Ping และ IndexNow ทันทีที่บทความถูกเผยแพร่</div>'
    });

    var html =
      ui.pageHead({
        eyebrow: 'M4 · Auto Publisher',
        title: 'เผยแพร่อัตโนมัติ',
        desc: 'เชื่อมต่อเว็บลูกค้าผ่าน API ตั้งตารางเผยแพร่ล่วงหน้า พร้อมแจ้ง Google ทันที และเลือกโหมดอนุมัติได้'
      }) +
      modeCardHtml +
      '<div class="grid grid-2 mb">' + targetsCardHtml + indexCardHtml + '</div>' +
      calendarCardHtml +
      approvalCardHtml;

    return {
      html: html,
      mount: function (root) {
        // 1) โหมดเผยแพร่ — interactive
        var modesWrap = root.querySelector('#rp-m4-modes');

        function wireModes() {
          var opts = modesWrap.querySelectorAll('.mode-opt');
          opts.forEach(function (el) {
            el.onclick = function () {
              var m = el.getAttribute('data-mode');
              if (RP.data.m4.mode === m) return;
              RP.data.m4.mode = m;
              modesWrap.innerHTML = buildModes();
              wireModes();
              var label = m === 'auto' ? 'Full-Auto 100%' : 'Auto + Human Approve';
              ui.toast('เปลี่ยนโหมดเป็น <b>' + esc(label) + '</b>');
            };
          });
        }
        if (modesWrap) wireModes();

        // 4) คิวรออนุมัติ — approve buttons
        root.querySelectorAll('button.approve').forEach(function (btn) {
          btn.onclick = function () {
            var idx = btn.getAttribute('data-idx');
            var row = root.querySelector('tr[data-row="' + idx + '"]');
            var cell = row ? row.querySelector('[data-cell="act"]') : null;
            if (cell) cell.innerHTML = ui.badge('อนุมัติแล้ว', 'green');
            ui.toast('อนุมัติและส่งเข้าคิวเผยแพร่แล้ว ✓');
          };
        });
      }
    };
  };
})(window.RP);

</script>
<script>

/* ============================================================
   View: M5 — AI Visibility & Rank Tracker (แดชบอร์ดวัดผล)
   ฝั่ง SEO: อันดับ Google + Search Console
   ฝั่ง AEO: Prompt Sampling วัด AI Citation + Share of Voice
   ============================================================ */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt, d = RP.data.m5;

  function seoKpis() {
    var s = d.seo;
    return '<div class="grid grid-4 mb">' +
      ui.kpi({ label: 'คีย์เวิร์ดที่ติดตาม', value: fmt.n(s.keywordsTracked), foot: 'ผ่าน SERP API รายวัน' }) +

        foot: '<span class="trend-up">▲ +' + (s.page1 - s.page1Prev) + '</span> จากเดือนก่อน' }) +
      ui.kpi({ label: 'ติด Top 3', value: fmt.n(s.top3), tone: 'pos', foot: 'ตำแหน่งทองของ SERP' }) +
      ui.kpi({ label: 'อันดับเฉลี่ย', value: s.avgPosition.toFixed(1), tone: 'brand',
        foot: '<span class="trend-up">▲ ดีขึ้น ' + (s.avgPositionPrev - s.avgPosition).toFixed(1) + '</span>' }) +
      '</div>';
  }

  function seoCard() {
    var s = d.seo;
