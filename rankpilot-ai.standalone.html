    return ui.card({
      title: 'ฝั่ง SEO — Google Search Console (90 วัน)', sub: 'คลิก & การมองเห็น',
      body:
        '<div class="row between wrap mb"><div><div class="soft small">คลิกรวม 90 วัน</div>' +
        '<div class="bb" style="font-size:26px;color:var(--brand-700)">' + fmt.n(clicksNow) + '</div></div>' +
        ui.spark(s.clicks90, { w: 220, h: 56, color: 'var(--brand-600)' }) + '</div>' +
        '<div class="divider"></div>' +
        '<div class="row between wrap"><div><div class="soft small">Impressions (พันครั้ง)</div>' +
        '<div class="bb" style="font-size:22px">' + fmt.n(impNow) + 'K</div></div>' +
        ui.spark(s.impressions90, { w: 220, h: 56, color: '#17b978' }) + '</div>'

  function citationCard() {
    var c = RP.data.m5.citation;
    return ui.card({
      title: 'ฝั่ง AEO — AI Citation Share of Voice', sub: 'สัดส่วนที่ AI หยิบเราไปอ้างอิง',

        '<div class="row" style="gap:22px;align-items:center">' +
        '<div class="ring" style="--p:' + c.sov + '"><span class="ring-val">' + c.sov + '%</span></div>' +
        '<div style="flex:1">' +
        '<div class="soft small">แนวโน้ม Citation SoV (10 สัปดาห์)</div>' +

        '<div class="small" style="margin-top:6px"><span class="trend up">▲ ' + (c.sov - c.sovPrev) + '%</span> จากเดือนก่อน · เป้าหมาย 15–25%</div>' +
        '</div></div>'
    });

  function enginesCard() {
    var c = RP.data.m5.citation;

      return '<div class="list-row"><div style="width:96px" class="b">' + esc(e.name) + '</div>' +

        '<span style="width:' + e.us + '%;background:var(--brand-600)" title="เรา ' + e.us + '%"></span>' +

        '<span><i style="background:var(--border)"></i> ไม่มีใครถูกอ้าง</span></div>'

  function competitorCard() {
    var c = RP.data.m5.citation;

  function promptCard() {

        '</tr>';
    }).join('');

    return ui.card({
      title: 'Prompt Sampling — วัด AI Citation', sub: 'ยิงชุดคำถามเป้าหมายไปที่ AI แล้ววัดว่าถูกอ้างอิงไหม',
      flush: true,
      action: '<span class="badge blue">ถูกอ้าง ' + citedCount + '/' + d.prompts.length + ' คำถาม</span>',
      body: '<div class="tbl-wrap"><table class="tbl">' +
        '<thead><tr><th>คำถามเป้าหมาย</th><th class="center">ChatGPT</th><th class="center">Gemini</th><th class="center">Perplexity</th><th class="center">สถานะ</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div>'
    });
  }

  function curProj() { return RP.data.project.list.filter(function (x) { return x.id === RP.data.project.current; })[0]; }

  function liveTools() {
    var p = curProj();
    return ui.card({
      title: 'โหมด Live — ดึงข้อมูลจริงจาก backend', sub: 'ใช้โดเมน/แบรนด์ของโปรเจ็คปัจจุบัน: ' + esc(p.domain), cls: 'mb',
      action: RP.api.enabled() ? ui.badge('● Live เปิด', 'green') : ui.badge('Live ปิด', 'amber'),
      body:
        '<div class="row wrap" style="gap:10px">' +

      : '<div class="warn-box mb">ยังไม่ติดหน้า 1 สำหรับ "' + esc(res.keyword) + '" (อันดับปัจจุบัน: ' + (res.our_rank || 'ไม่พบใน 100 อันดับ') + ')</div>';

  function gscModal(res) {
    var rows = (res.top_queries || []).map(function (q) {
      return '<tr><td class="tbl-title">' + esc(q.query) + '</td><td class="num">' + fmt.n(q.clicks) + '</td><td class="num">' + fmt.n(q.impressions) + '</td><td class="num">' + q.ctr + '%</td><td class="num">' + q.position + '</td></tr>';
    }).join('');
    ui.modal({ title: 'Google Search Console (ข้อมูลจริง)', sub: esc(res.site_url) + ' · ' + res.period_days + ' วัน', width: 820,
      body: '<div class="grid grid-3 mb">' +
        ui.kpi({ label: 'คลิกรวม', value: fmt.n(res.clicks), tone: 'brand' }) +
        ui.kpi({ label: 'Impressions', value: fmt.n(res.impressions) }) +
        ui.kpi({ label: 'อันดับเฉลี่ย', value: res.avg_position == null ? '—' : res.avg_position }) + '</div>' +
        '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>คำค้น</th><th>คลิก</th><th>Impr.</th><th>CTR</th><th>อันดับ</th></tr></thead><tbody>' + rows + '</tbody></table></div>' });
  }

  function citeModal(res) {
    var eng = res.per_engine || {};
    var rows = Object.keys(eng).map(function (k) {
      var e = eng[k];
      return '<tr><td class="bb">' + esc(k) + '</td><td class="num">' + e.answered + '</td><td class="num">' + e.cited + '</td><td>' + (e.sov_percent == null ? '<span class="soft">—</span>' : ui.badge(e.sov_percent + '%', 'green')) + '</td></tr>';
    }).join('');
    ui.modal({ title: 'Prompt Sampling — AI Citation (ข้อมูลจริง)', sub: 'Share of Voice รวม: ' + (res.overall_sov_percent == null ? '—' : res.overall_sov_percent + '%'), width: 720,
      body: '<div class="note-box mb">' + esc(res.note || '') + '</div>' +
        '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>เอนจิน</th><th>ตอบ</th><th>อ้างอิงเรา</th><th>SoV</th></tr></thead><tbody>' + rows + '</tbody></table></div>' });

  RP.views.m5 = function () {
    var html =
      ui.pageHead({ eyebrow: 'M5 · AI Visibility & Rank Tracker', title: 'วัดผล & Rank Tracker',
        desc: 'วัดผลทั้ง 2 ฝั่งในที่เดียว — ฝั่ง <b>SEO</b> ติดตามอันดับ Google รายวันและทราฟฟิกจาก Search Console · ฝั่ง <b>AEO</b> ใช้ Prompt Sampling ยิงคำถามไปที่ ChatGPT / Gemini / Perplexity เพื่อวัดว่าแบรนด์เราถูกอ้างอิงกี่เปอร์เซ็นต์ (Share of Voice)' }) +
      liveTools() +
      seoKpis() +
      '<div class="grid grid-2 mb">' + seoCard() + citationCard() + '</div>' +
      '<div class="grid grid-2 mb">' + enginesCard() + competitorCard() + '</div>' +
      promptCard() +
      '<div class="hint" style="margin-top:14px">📌 ข้อควรรู้: การวัด AI Citation ไม่มี API ทางการ ผลจึงเป็น "ค่าประมาณเชิงสถิติ" จากการสุ่มยิงคำถาม — คำตอบ AI เปลี่ยนได้ตามผู้ใช้/เวลา (ดูหน้าความเสี่ยงในรายงาน)</div>';

    return {
      html: html,
      mount: function (root) {
        var p = curProj();
        var rk = root.querySelector('#m5_rank');
        if (rk) rk.onclick = function () {
          var kw = (root.querySelector('#m5_kw').value || '').trim();
          if (!kw) { RP.ui.toast('พิมพ์คีย์เวิร์ดก่อนครับ'); return; }
          RP.live(RP.api.rankCheck(kw, p.domain), rankModal);
        };
        var gs = root.querySelector('#m5_gsc');
        if (gs) gs.onclick = function () { RP.live(RP.api.gsc('sc-domain:' + p.domain), gscModal); };
        var ct = root.querySelector('#m5_cite');
        if (ct) ct.onclick = function () {
          var qs = RP.data.m5.prompts.map(function (x) { return x.q; });
          RP.live(RP.api.citation(qs, p.brandTerms || [], p.domain), citeModal);
        };
      }
    };
  };

})(window.RP);

<script>
/* assets/js/views/m6.js */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  RP.views.m6 = function () {
    var d = (RP.data && RP.data.m6) || {};

    }) + '';

      body: insBody,
      cls: 'mb'
    });

    // 3) Auto-Tuning
    var actBody = '';
    for (var a = 0; a < actions.length; a++) {
      var ac = actions[a] || {};
      var okFlag = !!ac.ok;
      actBody += '<div class="list-row row between wrap">' +
        '<div class="grow">' +
          '<div class="t">' + esc(ac.t || '') + '</div>' +
          '<div class="s soft">' + esc(ac.when || '') + '</div>' +
        '</div>' +
        ui.badge(okFlag ? 'ปรับแล้ว' : 'กำลังรอผล', okFlag ? 'green' : 'amber') +
      '</div>';
    }
    html += ui.card({
      title: 'การปรับอัตโนมัติรอบถัดไป (Auto-Tuning)',
      sub: 'ระบบปรับเทมเพลต + ลำดับความสำคัญของคิวงานเองตามสิ่งที่เรียนรู้',
      body: actBody,
      flush: true,
      cls: 'mb'
    });

    // 4) รายงานสรุปรายสัปดาห์
    var humanHrs = (wr.humanHours != null) ? wr.humanHours : 0;
    var autoTone = (humanHrs < 2) ? 'pos' : '';
    var repBody = '<div class="grid grid-3">' +
      ui.kpi({ label: 'เผยแพร่บทความ', value: fmt.n(wr.published || 0) + ' บทความ', tone: 'brand' }) +
      ui.kpi({ label: 'ติดหน้า 1 ใหม่', value: fmt.n(wr.newPage1 || 0) + ' คีย์เวิร์ด', tone: 'pos', foot: 'ขึ้นหน้าแรกในรอบสัปดาห์' }) +
      ui.kpi({ label: 'Citation เพิ่ม', value: '+' + fmt.n(wr.citationsGained || 0), tone: 'brand', foot: 'ถูกอ้างอิงโดย AI Answer เพิ่มขึ้น' }) +
      ui.kpi({ label: 'รีเฟรชหน้าเก่า', value: fmt.n(wr.refreshed || 0) + ' หน้า' }) +
      ui.kpi({ label: 'เวลาที่คนต้องใช้', value: fmt.n(humanHrs) + ' ชม./สัปดาห์', tone: autoTone, foot: 'ระบบทำเอง ≥ 90% (คนใช้เวลา < 2 ชม.)' }) +
    '</div>';
    repBody += '<div class="hint dashed">รายงานนี้สรุปครบทั้ง 3 คำถาม: <b>ทำอะไรไปบ้าง</b> · <b>ผลเป็นอย่างไร</b> · <b>รอบหน้าจะทำอะไร</b></div>';
    html += ui.card({
      title: 'รายงานสรุปรายสัปดาห์',
      sub: 'ส่งอัตโนมัติทาง ' + esc(wr.sentTo || ''),
      body: repBody,
      cls: 'mb'
    });

    // 5) วงจร AI Growth Loop
    if (loop.length) {
      var loopBody = '<div class="row wrap gap-s">';
      for (var l = 0; l < loop.length; l++) {
        var st = loop[l] || {};
        loopBody += '<div class="chip"><b>' + esc(String(st.n)) + '</b> · ' + esc(st.t || '') +
          '<span class="text soft small"> — ' + esc(st.d || '') + '</span></div>';
        if (l < loop.length - 1) loopBody += '<span class="text muted">→</span>';
      }
      loopBody += '<span class="text muted">↻</span>';
      loopBody += '</div>';
      loopBody += '<div class="text soft small" style="margin-top:8px">เมื่อถึงขั้น <b>Learn</b> ระบบจะวนกลับไปขั้น <b>Discover</b> ทันที — วงจรนี้ทำให้ทุกรอบฉลาดกว่ารอบก่อน</div>';
      html += ui.card({
        title: 'วงจร AI Growth Loop',
        sub: 'Discover → Create → Optimize → Publish → Measure → Learn แล้ววนกลับ',
        body: loopBody
      });
    }

    return { html: html, mount: null };
  };
})(window.RP);

</script>
<script>
/* assets/js/views/report.js */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  function tbl(head, rows) {
    return '<div class="tbl-wrap"><table class="tbl"><thead><tr>' +
      head + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  RP.views.report = function () {
    var d = RP.data || {};

    // ---- 1) แถบสถิติ (facts) ----
    var facts = d.facts || [];
    var factsHtml = '<div class="grid grid-4 mb">';
    facts.forEach(function (f) {
      factsHtml +=
        '<div class="card card-pad center">' +
          '<div class="bb" style="font-size:1.8rem;line-height:1.2;color:var(--purple-700)">' + esc(f.v) + '</div>' +
          '<div class="soft small">' + esc(f.d) + '</div>' +
        '</div>';
    });
    factsHtml += '</div>';

    // ---- 2) แผนพัฒนา (Roadmap) ----
    var roadmap = d.roadmap || [];
    var rmRows = '';
    roadmap.forEach(function (r) {
      rmRows +=
        '<tr>' +
          '<td class="bb">' + esc(r.phase) + '</td>' +
          '<td>' + esc(r.scope) + '</td>' +
          '<td class="nowrap">' + esc(r.weeks) + '</td>' +
          '<td>' + ui.bar(r.progress) + ' ' + esc(String(r.progress)) + '%</td>' +
        '</tr>';
    });
    var roadmapCard = ui.card({
      title: 'แผนพัฒนา (Roadmap)',
      sub: 'แบ่งเป็น 4 เฟส',
      flush: true,
      cls: 'mb',
      body: tbl(
        '<th>เฟส</th><th>ขอบเขต</th><th>ระยะเวลา</th><th>ความคืบหน้า</th>',
        rmRows
      )
    });

    // ---- 3) ตัวชี้วัดความสำเร็จ (KPI) ----
    var kpiTargets = d.kpiTargets || [];
    var kpiRows = '';
    kpiTargets.forEach(function (k) {
      kpiRows +=
        '<tr>' +
          '<td class="bb">' + esc(k.kpi) + '</td>' +
          '<td>' + esc(k.target) + '</td>' +
          '<td class="num">' + esc(k.curTxt) + '</td>' +
          '<td>' + ui.bar(k.pct) + ' ' + esc(String(k.pct)) + '%</td>' +
        '</tr>';
    });
    var kpiCard = ui.card({
      title: 'ตัวชี้วัดความสำเร็จ (KPI) — เป้าหมาย 6 เดือน',
      flush: true,
      cls: 'mb',
      body: tbl(
        '<th>KPI</th><th>เป้าหมาย</th><th>ปัจจุบัน</th><th>ความคืบหน้า</th>',
        kpiRows
      )
    });

    // ---- 4) กลยุทธ์ที่ทำให้เห็นผลจริง ----
    var strategies = d.strategies || [];
    var stratBody = '';
    strategies.forEach(function (s) {
      stratBody +=
        '<div class="list-row"><div class="grow">' +
          '<div class="t bb">' + esc(s.t) + '</div>' +
          '<div class="s soft small">' + esc(s.d) + '</div>' +
        '</div></div>';
    });
    stratBody += '<div class="note-box">' + esc(d.strategyNote) + '</div>';
    var stratCard = ui.card({
      title: 'กลยุทธ์ที่ทำให้เห็นผลจริง',
      cls: 'mb',
      body: stratBody
    });

    // ---- 5) ประมาณการต้นทุน ----
    var costs = d.costs || [];
    var costRows = '';
    costs.forEach(function (c) {
      costRows +=
        '<tr>' +
          '<td>' + esc(c.item) + '</td>' +
          '<td class="right">' + esc(c.est) + '</td>' +
        '</tr>';
    });
    costRows +=
      '<tr>' +
        '<td class="bb">รวมโดยประมาณ</td>' +
        '<td class="bb right">' + esc(d.costTotal) + '</td>' +
      '</tr>';
    var costBody =
      tbl('<th>รายการ</th><th class="right">ประมาณการ</th>', costRows) +
      '<div class="hint">ต้นทุนต่ำกว่าจ้างนักเขียน SEO 1 คนหลายเท่า — โมเดลนี้จึงมี Margin สูง</div>';
    var costCard = ui.card({
      title: 'ประมาณการต้นทุน (ต่อ 1 โปรเจ็ค/เดือน)',
      flush: true,
      cls: 'mb',
      body: costBody

    // ---- 6) สถาปัตยกรรม & เทคโนโลยี ----

    var stackRows = '';
    stack.forEach(function (s) {

          '<td class="soft">' + esc(s.note) + '</td>' +

    var stackCard = ui.card({

      '<div class="note-box">ลำดับที่แนะนำ: ใช้เองก่อนเพื่อพิสูจน์ว่า "ระบบดันเว็บติดจริง" → เก็บตัวเลขเป็น Case Study → เปิดรับลูกค้า Agency → เมื่อระบบนิ่งค่อยเปิด SaaS</div>';
    var priceCard = ui.card({
      title: 'โมเดลธุรกิจ & แนวทางหารายได้',
      flush: true,
      cls: 'mb',
      body: priceBody
    });

    // ---- 8) ความเสี่ยงที่ต้องรู้ก่อนลงมือ ----
    var risks = d.risks || [];
    var riskBody = '';
    risks.forEach(function (r) {
      riskBody +=
        '<div class="warn-box mb">' +
          '<div class="bb">⚠ ' + esc(r.t) + '</div>' +
          '<div>' + esc(r.d) + '</div>' +
        '</div>';
    });
    var riskCard = ui.card({
      title: 'ความเสี่ยงที่ต้องรู้ก่อนลงมือ',
      cls: 'mb',
      body: riskBody
    });

    // ---- 9) แหล่งอ้างอิง ----
    var references = d.references || [];
    var refBody = '';
    references.forEach(function (r) {
      refBody +=
        '<div class="list-row"><div class="grow">' +
          '<div class="t soft small">' + esc(r) + '</div>' +
        '</div></div>';
    });
    var refCard = ui.card({
      title: 'แหล่งอ้างอิง',
      cls: 'mb',
      body: refBody
    });

    var html =
      ui.pageHead({
        eyebrow: 'รายงานโครงการ',
        title: 'รายงาน & Roadmap',
        desc: 'สรุปแผนพัฒนา ตัวชี้วัดความสำเร็จ ต้นทุน สถาปัตยกรรม โมเดลธุรกิจ และความเสี่ยง (อ้างอิงหัวข้อ 7–11 ของเอกสารโครงการ)'
      }) +
      factsHtml +
      roadmapCard +
      kpiCard +
      stratCard +
      costCard +
      stackCard +
      priceCard +
      riskCard +
      refCard;

    return { html: html, mount: null };
  };
})(window.RP);

</script>

  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  function healthDots(h) {
    var items = [['GSC', h.gsc], ['SERP', h.serp], ['AI Citation', h.ai], ['เผยแพร่', h.publish]];
    return '<div class="row wrap gap-s" style="margin:10px 0">' + items.map(function (x) {
      return '<span class="chip" style="gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:' +
        (x[1] ? 'var(--green-500)' : 'var(--border)') + '"></span>' + esc(x[0]) + '</span>';
    }).join('') + '</div>';
  }

  function projectCard(p) {
    var isCur = p.id === RP.data.project.current;
    var setup = p.status === 'setup';
    var connected = (p.health.gsc ? 1 : 0) + (p.health.serp ? 1 : 0) + (p.health.ai ? 1 : 0) + (p.health.publish ? 1 : 0);
    return '<div class="card card-pad" style="' + (isCur ? 'border-color:var(--brand-500);box-shadow:0 0 0 2px rgba(99,102,241,.15)' : '') + '">' +
      '<div class="row between wrap" style="gap:8px">' +
      '<div class="bb" style="font-size:16px">' + esc(p.name) + (isCur ? ' ' + ui.badge('กำลังใช้งาน', 'green') : '') + '</div>' +
      ui.badge('แพ็กเกจ ' + p.plan, 'purple') + '</div>' +
      '<div class="soft small" style="margin-top:2px">🌐 ' + esc(p.domain) + ' · ' + esc(p.country) + ' · สร้างเมื่อ ' + esc(p.created) + '</div>' +
      (setup ? '<div class="hint" style="margin-top:10px">⚠️ ตั้งค่ายังไม่ครบ (' + connected + '/4) — เชื่อม AI Citation + ปลายทางเผยแพร่ให้ครบก่อนเริ่มวัดผล</div>' : '') +
      healthDots(p.health) +
      '<div class="row wrap" style="gap:18px;margin:6px 0 12px">' +
      stat('คีย์เวิร์ดติดตาม', fmt.n(p.keywords)) + stat('คลัสเตอร์', p.clusters) +
      stat('โหมด', p.mode === 'auto' ? 'Full-Auto' : 'Human Approve') + stat('Freshness', p.freshnessDays + ' วัน') +
      '</div>' +
      '<div class="row gap-s wrap">' +
      (isCur ? '<button class="btn btn-sm" disabled style="opacity:.6">● ใช้งานอยู่</button>'
             : '<button class="btn btn-primary btn-sm use-proj" data-id="' + p.id + '">เปิดใช้งานโปรเจ็คนี้</button>') +
      '<button class="btn btn-sm cfg-proj" data-id="' + p.id + '">⚙️ ตั้งค่า</button>' +
      '<button class="btn btn-sm open-dash" data-id="' + p.id + '">เปิดแดชบอร์ด →</button>' +
      '</div></div>';
  }
  function stat(l, v) { return '<div><div class="soft" style="font-size:11px">' + esc(l) + '</div><div class="bb">' + v + '</div></div>'; }

  function quotaCard() {
    var a = RP.data.account, used = RP.data.project.list.length, q = a.projectQuota;
    var full = used >= q;
    return '<div class="card mb"><div class="card-pad row between wrap" style="gap:14px">' +
      '<div style="flex:1;min-width:260px">' +
      '<div class="row gap-s" style="margin-bottom:6px"><span class="bb">แพ็กเกจ ' + esc(a.plan) + '</span>' + ui.badge(a.billingCycle, 'blue') + '</div>' +
      '<div class="soft small" style="margin-bottom:8px">ใช้ไป <b>' + used + '</b> จาก <b>' + q + '</b> โปรเจ็ค' + (full ? ' — เต็มโควตาแล้ว' : '') + '</div>' +
      ui.bar(used / q * 100, full ? 'amber' : '') + '</div>' +
      '<div class="row gap-s wrap">' +
      '<button class="btn" id="loadDb">⤓ โหลดจากฐานข้อมูล</button>' +
      '<button class="btn btn-green new-proj"' + (full ? ' disabled style="opacity:.55"' : '') + '>＋ สร้างโปรเจ็คใหม่</button>' +
      '</div>' +
      '</div>' +
      (full ? '<div style="padding:0 22px 16px"><div class="hint">ต้องการมากกว่า ' + q + ' โปรเจ็ค? อัปเกรดเป็น <b>Enterprise</b> (ไม่จำกัดเว็บ) ในหน้า การตั้งค่า › บัญชี & ทีม</div></div>' : '') +
      '</div>';
  }

  /* ---- Wizard: สร้างโปรเจ็คใหม่ ---- */
  function openWizard() {
    var body =
      '<div class="hint mb">การสร้างโปรเจ็คคือการบอกระบบว่า "จะดันเว็บไหน ด้วยคีย์เวิร์ด/คู่แข่งอะไร และเผยแพร่ที่ไหน" — ตั้งค่าเสร็จระบบเริ่มวงจรอัตโนมัติให้เอง</div>' +
      wizSection('1 · ข้อมูลโปรเจ็ค',
        field('ชื่อโปรเจ็ค', '<input class="input" id="np_name" placeholder="เช่น คลินิกความงาม XYZ" style="width:100%">') +
        field('โดเมนเว็บไซต์', '<input class="input" id="np_domain" placeholder="example.com" style="width:100%">') +
        field('ประเทศ / ภาษาเป้าหมาย', '<select class="select" id="np_country" style="width:100%"><option>ไทย / ภาษาไทย</option><option>ไทย / อังกฤษ</option></select>')) +
      wizSection('2 · การเชื่อมต่อที่ต้องมี (จำเป็นก่อนวัดผล)',
        checkline('SERP API — วัดอันดับ Google', true) +
        checkline('Google Search Console — ยืนยันโดเมน', false) +
        checkline('API วัด AI Citation (ChatGPT/Gemini/Perplexity)', false) +
        checkline('ปลายทางเผยแพร่ (WordPress / Webflow)', false)) +
      wizSection('3 · เป้าหมาย',
        field('คีย์เวิร์ด/หัวข้อเริ่มต้น (คั่นด้วย ,)', '<input class="input" id="np_kw" placeholder="เลเซอร์หน้าใส, ฟิลเลอร์, ครีมกันแดด" style="width:100%">') +
        field('โดเมนคู่แข่ง (คั่นด้วย ,)', '<input class="input" id="np_comp" placeholder="competitor-a.com, competitor-b.com" style="width:100%">') +
        field('ชื่อแบรนด์ที่ใช้ตรวจ AI Citation', '<input class="input" id="np_brand" placeholder="ชื่อแบรนด์ / ชื่อเว็บ" style="width:100%">')) +
      wizSection('4 · โหมดเผยแพร่',
        '<label class="row gap-s" style="cursor:pointer;margin-bottom:6px"><input type="radio" name="np_mode" value="approve" checked> <span>Auto + Human Approve (แนะนำ — กดอนุมัติก่อนเผยแพร่)</span></label>' +
        '<label class="row gap-s" style="cursor:pointer"><input type="radio" name="np_mode" value="auto"> <span>Full-Auto 100% (เผยแพร่เองเมื่อผ่านเกณฑ์คุณภาพ)</span></label>') +
      '<div class="row between" style="margin-top:18px"><span class="soft small">ตั้งค่าเพิ่มเติมได้ภายหลังที่ การตั้งค่า</span>' +
      '<button class="btn btn-primary" id="np_create">สร้างโปรเจ็ค & เริ่มวงจร</button></div>';
    ui.modal({ title: 'สร้างโปรเจ็คใหม่', sub: 'ตั้งค่าพื้นฐานให้ระบบเริ่มทำงานอัตโนมัติ', width: 720, body: body });
    var btn = document.getElementById('np_create');
    if (btn) btn.onclick = function () {
        var name = (document.getElementById('np_name').value || '').trim();
        var domain = (document.getElementById('np_domain').value || '').trim();
        if (!name || !domain) { ui.toast('กรุณากรอกชื่อโปรเจ็คและโดเมน'); return; }
        var modeEl = document.querySelector('input[name="np_mode"]:checked');
        var id = 'p' + (RP.data.project.list.length + 1);
        RP.data.project.list.push({
          id: id, name: name, domain: domain, mode: modeEl ? modeEl.value : 'approve',
          country: 'ไทย', lang: 'ภาษาไทย', plan: 'Pro', status: 'setup', created: 'เมื่อสักครู่',
          keywords: 0, clusters: 0,
          competitors: splitc(document.getElementById('np_comp').value),
          brandTerms: splitc(document.getElementById('np_brand').value),
          promptSet: 0, freshnessDays: 120, authors: 0,
          health: { gsc: false, serp: true, ai: false, publish: false }
        });
        ui.closeModal();
        ui.toast('สร้างโปรเจ็ค <b>' + esc(name) + '</b> แล้ว — เชื่อมต่อที่เหลือในหน้าตั้งค่าเพื่อเริ่มวัดผล ✓');
        RP.go('projects'); mountNow();
      };
  }
  function splitc(s) { return (s || '').split(',').map(function (x) { return x.trim(); }).filter(Boolean); }
  function wizSection(t, inner) { return '<div class="panel mb"><div class="panel-head">' + esc(t) + '</div><div class="panel-body">' + inner + '</div></div>'; }
  function field(l, inp) { return '<div style="margin-bottom:10px"><div class="soft small" style="margin-bottom:4px">' + esc(l) + '</div>' + inp + '</div>'; }
  function checkline(t, on) { return '<div class="list-row"><span style="color:' + (on ? 'var(--green-600)' : 'var(--text-soft)') + ';font-weight:800">' + (on ? '✓' : '○') + '</span><div class="grow t small">' + esc(t) + '</div>' + (on ? ui.badge('พร้อม', 'green') : ui.badge('ต้องเชื่อม', 'amber')) + '</div>'; }

  function mountNow() { /* re-render current view */ if (location.hash === '#/projects') { var f = RP.views.projects(); var c = document.getElementById('content'); c.innerHTML = '<div class="view">' + f.html + '</div>'; f.mount(c); } }

  RP.views.projects = function () {
    var cards = RP.data.project.list.map(projectCard).join('');
    var html =
      ui.pageHead({ eyebrow: 'ระบบ · Multi-Project', title: 'จัดการโปรเจ็ค',
        desc: 'หนึ่งบัญชีดูแลได้หลายเว็บ/หลายลูกค้า — แต่ละโปรเจ็คมีคีย์เวิร์ด คู่แข่ง ปลายทางเผยแพร่ และการวัดผลของตัวเอง (จำนวนโปรเจ็คตามแพ็กเกจ)' }) +
      quotaCard() +
      '<div class="grid grid-2">' + cards + '</div>';
    return {
      html: html,
      mount: function (root) {
        var np = root.querySelector('.new-proj'); if (np && !np.disabled) np.onclick = openWizard;
        var ld = root.querySelector('#loadDb');
        if (ld) ld.onclick = function () {
          if (!RP.api.reachable()) { RP.ui.toast('ตั้ง base URL ของ backend ในหน้า ⚙️ การตั้งค่าก่อน'); return; }
          RP.ui.toast('กำลังโหลดจากฐานข้อมูล…');
          RP.api.projects().then(function (res) {
            if (!res.projects || !res.projects.length) { RP.ui.toast('ยังไม่มีโปรเจ็คใน DB — ลองรัน scripts/seed.py'); return; }
            RP.data.project.list = res.projects.map(function (p) {
              return { id: 'db' + p.id, name: p.name, domain: p.domain, mode: p.mode, country: p.country || 'ไทย', lang: 'ภาษาไทย', plan: 'Pro', status: 'active', created: 'จากฐานข้อมูล', keywords: 0, clusters: 0, competitors: [], brandTerms: [], promptSet: 0, freshnessDays: p.freshness_days || 120, authors: 0, health: { gsc: false, serp: false, ai: false, publish: false } };
            });
            RP.data.project.current = RP.data.project.list[0].id;
            RP.ui.toast('โหลด ' + res.projects.length + ' โปรเจ็คจากฐานข้อมูลแล้ว ✓');
            mountNow();
          }).catch(function (e) { RP.ui.toast('โหลดไม่ได้: ' + RP.esc(e.message) + ' (ต้องเข้าสู่ระบบจริง + ตั้ง DATABASE_URL)'); });
        };
        Array.prototype.forEach.call(root.querySelectorAll('.use-proj'), function (b) {
          b.onclick = function () {
            RP.data.project.current = b.getAttribute('data-id');
            var p = RP.data.project.list.filter(function (x) { return x.id === RP.data.project.current; })[0];
            ui.toast('สลับมาที่โปรเจ็ค <b>' + esc(p.name) + '</b>');
            mountNow();
          };
        });
        Array.prototype.forEach.call(root.querySelectorAll('.cfg-proj'), function (b) {
          b.onclick = function () { RP.data.project.current = b.getAttribute('data-id'); RP.go('settings'); };
        });
        Array.prototype.forEach.call(root.querySelectorAll('.open-dash'), function (b) {
          b.onclick = function () { RP.data.project.current = b.getAttribute('data-id'); RP.go('dashboard'); };
        });
      }
    };
  };

})(window.RP);

</script>
<script>
/* assets/js/views/settings.js */
/* ============================================================
   View: การตั้งค่า (Settings)
   แท็บ: การเชื่อมต่อ · ตั้งค่าโปรเจ็คนี้ · บัญชี & ทีม · การวัดผลทำงานยังไง (ของจริง)
   ============================================================ */
(function (RP) {
  'use strict';
  var ui = RP.ui, esc = RP.esc, fmt = RP.fmt;

  var curTab = 'connect';
  var TABS = [
    { id: 'connect', t: '🔌 การเชื่อมต่อ' },
    { id: 'project', t: '🎯 ตั้งค่าโปรเจ็คนี้' },
    { id: 'account', t: '👤 บัญชี & ทีม' },
    { id: 'measure', t: '📏 การวัดผลทำงานยังไง' }
  ];

  var liveInt = null; // สถานะ integration จริงจาก backend (ถ้าดึงมาแล้ว)
  var ID_MAP = { serp: 'serp', gsc: 'gsc', llm: 'llm', aiapi: 'citation', wp: 'wordpress', webflow: 'webflow', indexnow: 'indexnow', ga4: 'ga4', notify: 'line' };
  function liveConnected(mockId) {
    if (!liveInt) return null;
    var f = liveInt.filter(function (x) { return x.id === ID_MAP[mockId]; })[0];
    return f ? f.connected : null;
  }

  function liveCard() {
    var on = RP.api.live;
    return '<div class="card mb"><div class="card-pad">' +
      '<div class="row between wrap" style="gap:10px">' +
      '<div><div class="bb">โหมดข้อมูล: ' + (on ? '<span style="color:var(--green-600)">● Live (ดึงสดจาก backend)</span>' : 'จำลอง (Mock)') + '</div>' +
      '<div class="soft small">เปิด Live เพื่อให้แดชบอร์ดดึงข้อมูลจริงจาก backend FastAPI — ต้องรัน <code>uvicorn app.main:app</code> ก่อน</div></div>' +
      '<label class="row gap-s" style="cursor:pointer"><input type="checkbox" id="liveToggle"' + (on ? ' checked' : '') + '> <span class="b">เปิดโหมด Live</span></label></div>' +
      '<div class="row wrap" style="gap:8px;margin-top:12px">' +
      '<div class="field" style="flex:1;min-width:220px"><span class="ico">🖥️</span><input id="apiBase" value="' + esc(RP.api.base) + '" placeholder="http://localhost:8000"></div>' +
      '<button class="btn" id="apiTest">ทดสอบการเชื่อมต่อ</button>' +
      '<button class="btn btn-primary" id="apiPull">ดึงสถานะจริงจาก backend</button></div>' +
      '<div class="hint" style="margin-top:10px">💡 โหมด Live ทำงานเมื่อเปิดจากเครื่อง (index.html / standalone) ที่รัน backend อยู่ — ในลิงก์ artifact เบราว์เซอร์จะบล็อกการต่อ localhost (CSP) จึงใช้ข้อมูลจำลอง</div>' +
      '</div></div>';
  }

  function curProj() { return RP.data.project.list.filter(function (x) { return x.id === RP.data.project.current; })[0]; }
  function chips(arr, empty) {
    if (!arr || !arr.length) return '<span class="soft small">' + (empty || 'ยังไม่มี') + '</span>';
    return '<div class="tag-list">' + arr.map(function (x) { return '<span class="chip">' + esc(x) + '</span>'; }).join('') + '</div>';
  }

  /* ---------- TAB 1: การเชื่อมต่อ ---------- */
  function tabConnect() {
    var a = RP.data.account;
    var done = RP.data.onboarding.filter(function (o) { return o.done; }).length;
    var total = RP.data.onboarding.length;
    var progress =
      '<div class="card mb"><div class="card-pad">' +
      '<div class="row between wrap"><div class="bb">ความพร้อมก่อนวัดผลจริง (Onboarding)</div>' +
      '<span class="badge ' + (done === total ? 'green' : 'amber') + '">' + done + '/' + total + ' ขั้นตอน</span></div>' +
      '<div style="margin:10px 0">' + ui.bar(done / total * 100, done === total ? 'green' : '') + '</div>' +
      '<div class="grid grid-2" style="gap:4px 18px">' +
      RP.data.onboarding.map(function (o) {
        return '<div class="list-row" style="padding:6px 0"><span style="color:' + (o.done ? 'var(--green-600)' : 'var(--amber-600)') + ';font-weight:800">' +
          (o.done ? '✓' : '○') + '</span><div class="grow t small">' + esc(o.t) + '</div></div>';
      }).join('') + '</div></div></div>';

    function intCard(i) {
      var lc = liveConnected(i.id);
      var conn = lc === null ? i.connected : lc;
      var src = lc === null ? i.detail : (conn ? 'เชื่อมแล้ว (จาก backend)' : 'ยังไม่ตั้งคีย์ (จาก backend)');
      return '<div class="card card-pad">' +
        '<div class="row between wrap" style="gap:8px"><div class="bb">' + esc(i.name) + '</div>' +
        ui.badge(conn ? '● เชื่อมแล้ว' : 'ต้องเชื่อม', conn ? 'green' : 'amber') + '</div>' +
        '<div class="soft small" style="margin:2px 0 8px">ผู้ให้บริการ: ' + esc(i.provider) + (i.required ? ' · <b style="color:var(--red-text)">จำเป็น</b>' : ' · เสริม') + '</div>' +
        '<div class="small" style="margin-bottom:12px">⚙️ ใช้กับ: ' + esc(i.powers) + '</div>' +
        '<div class="row between"><span class="soft small">' + esc(src) + '</span>' +
        '<button class="btn btn-sm ' + (conn ? '' : 'btn-primary') + ' int-btn" data-id="' + i.id + '">' + (conn ? 'จัดการ' : 'เชื่อมต่อ') + '</button></div></div>';
    }
    var required = a.integrations.filter(function (i) { return i.required; });
    var optional = a.integrations.filter(function (i) { return !i.required; });
    return liveCard() + progress +
      '<div class="bb mb" style="font-size:15px">การเชื่อมต่อที่จำเป็น</div>' +
      '<div class="grid grid-2 mb-l">' + required.map(intCard).join('') + '</div>' +
      '<div class="bb mb" style="font-size:15px">การเชื่อมต่อเสริม</div>' +
      '<div class="grid grid-2">' + optional.map(intCard).join('') + '</div>' +
      '<div class="hint" style="margin-top:14px">🔒 คีย์และโทเคนทั้งหมดถูกเก็บเข้ารหัสฝั่งเซิร์ฟเวอร์ · ค่าใช้จ่าย API เรียกตามการใช้งานจริงของแต่ละโปรเจ็ค (~2,300–5,400 บาท/โปรเจ็ค/เดือน ตามเอกสาร)</div>';
  }

  /* ---------- TAB 2: ตั้งค่าโปรเจ็คนี้ ---------- */
  function tabProject() {
    var p = curProj();
    function row(l, v) { return '<div class="list-row"><div class="grow"><div class="soft small">' + esc(l) + '</div><div class="t">' + v + '</div></div></div>'; }
    var left = ui.card({ title: 'ข้อมูลโปรเจ็ค', body:
      '<div style="margin-bottom:10px"><div class="soft small" style="margin-bottom:4px">ชื่อโปรเจ็ค</div><input class="input" id="s_name" value="' + esc(p.name) + '" style="width:100%"></div>' +
      '<div style="margin-bottom:10px"><div class="soft small" style="margin-bottom:4px">โดเมน</div><input class="input" id="s_domain" value="' + esc(p.domain) + '" style="width:100%"></div>' +
      '<div style="margin-bottom:10px"><div class="soft small" style="margin-bottom:4px">ประเทศ / ภาษา</div><input class="input" value="' + esc(p.country + ' / ' + p.lang) + '" style="width:100%"></div>' +
      '<div><div class="soft small" style="margin-bottom:4px">โหมดเผยแพร่</div>' +
      '<select class="select" id="s_mode" style="width:100%"><option value="approve"' + (p.mode === 'approve' ? ' selected' : '') + '>Auto + Human Approve</option><option value="auto"' + (p.mode === 'auto' ? ' selected' : '') + '>Full-Auto 100%</option></select></div>'
    });
    var right = ui.card({ title: 'เป้าหมาย & การวัดผล', body:
      row('คีย์เวิร์ดที่ติดตาม', fmt.n(p.keywords) + ' คำ · ' + p.clusters + ' คลัสเตอร์') +
      '<div class="divider"></div>' +
      '<div class="soft small" style="margin-bottom:5px">โดเมนคู่แข่ง (เทียบ Share of Voice)</div>' + chips(p.competitors, 'ยังไม่ได้ตั้งคู่แข่ง') +
      '<div class="divider"></div>' +
      '<div class="soft small" style="margin-bottom:5px">ชื่อแบรนด์ที่ใช้ตรวจ AI Citation</div>' + chips(p.brandTerms) +
      '<div class="divider"></div>' +
      row('ชุดคำถาม Prompt Sampling', p.promptSet + ' คำถาม/รอบ') +
      row('เกณฑ์ Freshness', 'รีเฟรชเมื่อหน้าเก่ากว่า ' + p.freshnessDays + ' วัน') +
      row('Author Personas (E-E-A-T)', p.authors + ' โปรไฟล์')
    });
    return '<div class="hint mb">กำลังตั้งค่าโปรเจ็ค: <b>' + esc(p.name) + '</b> — ค่าเหล่านี้คือสิ่งที่ระบบใช้ "ขุดคำถาม → ผลิต → เผยแพร่ → วัดผล" ของโปรเจ็คนี้โดยเฉพาะ</div>' +
      '<div class="grid grid-2 mb">' + left + right + '</div>' +
      '<div class="row"><button class="btn btn-primary" id="s_save">บันทึกการตั้งค่า</button></div>';
  }

  /* ---------- TAB 3: บัญชี & ทีม ---------- */
  function tabAccount() {
    var a = RP.data.account;
    var plan = ui.card({ title: 'แพ็กเกจปัจจุบัน', body:
      '<div class="row between wrap" style="gap:10px"><div><div class="bb" style="font-size:20px;color:var(--purple-700)">' + esc(a.plan) + '</div>' +
      '<div class="soft small">' + esc(a.billingCycle) + ' · ' + a.projectQuota + ' โปรเจ็ค' + (a.whiteLabel ? ' · White-Label' : '') + '</div></div>' +
      '<button class="btn btn-sm" id="s_upgrade">อัปเกรด/จัดการแพ็กเกจ</button></div>' +
      '<div class="divider"></div>' +
      '<div class="grid grid-3" style="gap:10px">' +
      planTile('Starter', '2,900–4,900', '1 เว็บ · 60 บทความ/ด.', a.plan.indexOf('Starter') >= 0) +
      planTile('Pro', '9,900–14,900', '3 เว็บ · ไม่จำกัด · White-Label', a.plan.indexOf('Pro') >= 0) +
      planTile('Enterprise', 'เริ่ม 29,900', 'ไม่จำกัดเว็บ · API · SLA', a.plan.indexOf('Enterprise') >= 0) +
      '</div>'
    });
    var team = ui.card({ title: 'สมาชิกทีม & สิทธิ์', sub: 'เหมาะกับ Agency ที่ให้ลูกค้าเข้าดูรายงานได้', flush: true,
      action: '<button class="btn btn-sm btn-primary" id="s_invite">＋ เชิญสมาชิก</button>',
      body: '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>สมาชิก</th><th>อีเมล</th><th>สิทธิ์</th></tr></thead><tbody>' +
        a.team.map(function (m) {
          var tone = m.role.indexOf('เจ้าของ') >= 0 ? 'purple' : (m.role.indexOf('Editor') >= 0 ? 'blue' : '');
          return '<tr><td class="bb">' + esc(m.name) + '</td><td class="soft">' + esc(m.email) + '</td><td>' + ui.badge(m.role, tone) + '</td></tr>';
        }).join('') + '</tbody></table></div>'
    });
    return plan + '<div class="mb"></div>' + team +
      '<div class="note-box" style="margin-top:14px">💡 <b>White-Label (Pro/Enterprise):</b> ใส่โลโก้/โดเมนของเอเจนซีเอง ส่งรายงานให้ลูกค้าในนามแบรนด์คุณ — ลูกค้าเห็นเฉพาะโปรเจ็คของตัวเองด้วยสิทธิ์ "ดูอย่างเดียว"</div>';
  }
  function planTile(name, price, d, cur) {
    return '<div class="panel" style="' + (cur ? 'border-color:var(--brand-500);background:var(--surface-2)' : '') + '"><div class="panel-body">' +
      '<div class="row between"><span class="bb">' + name + '</span>' + (cur ? ui.badge('ปัจจุบัน', 'green') : '') + '</div>' +
      '<div class="bb" style="color:var(--purple-700);margin:4px 0">฿' + price + '<span class="soft" style="font-size:11px">/ด.</span></div>' +
      '<div class="soft small">' + esc(d) + '</div></div></div>';
  }

  /* ---------- TAB 4: การวัดผลทำงานยังไง (ของจริง) ---------- */
  function tabMeasure() {
    var block = function (icon, title, tone, real, body) {
      return '<div class="card card-pad">' +
        '<div class="row between wrap"><div class="row gap-s"><span style="font-size:20px">' + icon + '</span><span class="bb">' + esc(title) + '</span></div>' +
        ui.badge(real, tone) + '</div><div class="small" style="margin-top:10px;line-height:1.7">' + body + '</div></div>';
    };
    var table =
      '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>ตัวชี้วัด</th><th>แหล่งข้อมูลจริง</th><th>ตรวจสอบได้ไหม</th></tr></thead><tbody>' +
      mrow('อันดับ Google / ติดหน้า 1', 'SERP API + Search Console', 'ของจริง — เสิร์ชเองก็เห็น', 'green') +
      mrow('คลิก / Impressions / CTR', 'Google Search Console (first-party)', 'ของจริง — ข้อมูลจาก Google เอง', 'green') +
      mrow('AI Citation / Share of Voice', 'Prompt Sampling (ยิงถาม AI จริง)', 'ค่าประมาณเชิงสถิติ (สุ่มถาม)', 'amber') +
      mrow('ทราฟฟิก / Conversion / ROI', 'GA4 + ฟอร์ม/CRM', 'ของจริง — วัด Lead/ยอดขาย', 'green') +
      mrow('บทความ / คะแนน AEO', 'ข้อเท็จจริงจากระบบ', 'ของจริง — นับ/คำนวณจริง', 'green') +
      '</tbody></table></div>';
    return '<div class="warn-box mb" style="border-left-color:var(--amber-500);background:var(--amber-bg)">⚠️ <b>ความจริงที่ต้องรู้:</b> ตัวเลขที่เห็นในเดโมตอนนี้เป็น <b>ข้อมูลจำลอง</b> เพื่อสาธิต UX — เมื่อเชื่อม API/บัญชีจริงในแท็บ "การเชื่อมต่อ" ตัวเลขจะถูกแทนที่ด้วยข้อมูลที่ <b>ดึงสดจากแหล่งจริง</b> ทั้งหมด</div>' +
      '<div class="grid grid-3 mb">' +
      block('🔎', 'ฝั่ง SEO', 'green', 'ของจริง · ตรวจสอบได้', 'วัดจาก <b>SERP API</b> (ยิงคีย์เวิร์ด+ประเทศ+ภาษา ได้ผลอันดับ Google จริง) และ <b>Google Search Console</b> (คลิก/impression/อันดับ ตัวเลขจริงจาก Google เอง) — คุณเปิด Google เสิร์ชเองก็ตรวจได้ทันที ไม่มีทางปลอม') +
      block('🤖', 'ฝั่ง AEO (AI Citation)', 'amber', 'ของจริง · แต่เป็นค่าประมาณ', '<b>Prompt Sampling</b>: ระบบยิงชุดคำถามจริงไปที่ ChatGPT/Gemini/Perplexity ตามรอบ แล้ว "อ่านคำตอบ" ว่าเอ่ยถึง/อ้างอิงโดเมนเราไหม → นับ % = Share of Voice · เป็นการวัดจริง (ถามจริง อ่านจริง) แต่เป็น <b>ตัวอย่างเชิงสถิติ</b> เพราะ AI ตอบต่างกันตามผู้ใช้/เวลา และไม่มี API ทางการบอก citation ตรง ๆ') +
      block('💰', 'Conversion / ROI', 'green', 'ของจริง', 'เชื่อม <b>GA4</b> + ฟอร์ม/CRM เพื่อผูกทราฟฟิก Organic + AI Referral เข้ากับ <b>Lead/ยอดขายจริง</b> — พิสูจน์ ROI ได้ ไม่ใช่แค่ดูอันดับ') +
      '</div>' +
      ui.card({ title: 'สรุป: อะไรจริง / อะไรประมาณ', flush: true, body: table }) +
      '<div class="note-box" style="margin-top:14px">📌 <b>พูดตรง ๆ:</b> ฝั่ง SEO วัดได้จริงและตรวจสอบเองได้ 100% · ฝั่ง AI Citation วัดได้จริงแต่เป็นค่าประมาณจากการสุ่มถาม — <b>ไม่มีเครื่องมือไหนในโลก</b> (Profound, Otterly ก็ตาม) มีเลข AI citation แบบ absolute เพราะ AI ไม่เปิด API บอกตรง ๆ · เราจึงเน้นดู <b>แนวโน้ม</b> มากกว่าเลขเป๊ะจุดเดียว</div>';
  }
  function mrow(k, s, v, tone) {
    return '<tr><td class="bb">' + esc(k) + '</td><td class="soft">' + esc(s) + '</td><td>' + ui.badge(v, tone) + '</td></tr>';
  }

  function bodyFor(tab) {
    if (tab === 'connect') return tabConnect();
    if (tab === 'project') return tabProject();
    if (tab === 'account') return tabAccount();
    return tabMeasure();
  }

  function tabsBar() {
    return '<div class="row wrap gap-s mb" role="tablist">' + TABS.map(function (t) {
      return '<button class="chip set-tab' + (t.id === curTab ? ' on' : '') + '" data-tab="' + t.id + '">' + t.t + '</button>';
    }).join('') + '</div>';
  }

  function wire(root) {
    Array.prototype.forEach.call(root.querySelectorAll('.set-tab'), function (b) {
      b.onclick = function () {
        curTab = b.getAttribute('data-tab');
        root.querySelector('#setTabs').outerHTML = wrapTabs();
        root.querySelector('#setBody').innerHTML = bodyFor(curTab);
        wire(root);
      };
    });
    // tab-specific
    var save = root.querySelector('#s_save'); if (save) save.onclick = function () {
      var p = curProj();
      var n = root.querySelector('#s_name'); if (n) p.name = n.value.trim() || p.name;
      var d = root.querySelector('#s_domain'); if (d) p.domain = d.value.trim() || p.domain;
      var m = root.querySelector('#s_mode'); if (m) p.mode = m.value;
      ui.toast('บันทึกการตั้งค่าโปรเจ็ค <b>' + esc(p.name) + '</b> แล้ว ✓');
    };
    Array.prototype.forEach.call(root.querySelectorAll('.int-btn'), function (b) {
      b.onclick = function () {
        var i = RP.data.account.integrations.filter(function (x) { return x.id === b.getAttribute('data-id'); })[0];
        ui.toast(i.connected ? 'เปิดหน้าจัดการ <b>' + esc(i.name) + '</b>' : 'เปิดหน้าเชื่อมต่อ <b>' + esc(i.name) + '</b> (ใส่ API key / OAuth)');
      };
    });
    ['s_upgrade', 's_invite'].forEach(function (id) {
      var el = root.querySelector('#' + id); if (el) el.onclick = function () { ui.toast('เปิดหน้า' + (id === 's_invite' ? 'เชิญสมาชิกทีม' : 'จัดการแพ็กเกจ')); };
    });
    // โหมด Live
    var ab = root.querySelector('#apiBase');
    if (ab) ab.onchange = function () { RP.api.setBase(ab.value); };
    var lt = root.querySelector('#liveToggle');
    if (lt) lt.onchange = function () {
      if (ab) RP.api.setBase(ab.value);
      RP.api.setLive(lt.checked);
      ui.toast('โหมด Live: ' + (lt.checked ? '<b>เปิด</b>' : 'ปิด'));
      root.querySelector('#setBody').innerHTML = bodyFor(curTab); wire(root);
    };
    var at = root.querySelector('#apiTest');
    if (at) at.onclick = function () {
      if (ab) RP.api.setBase(ab.value);
      ui.toast('กำลังทดสอบการเชื่อมต่อ…');
      RP.api.health().then(function (h) { ui.toast('เชื่อม backend สำเร็จ ✓ (' + esc(h.service || 'ok') + ')'); })
        .catch(function (e) { ui.toast('เชื่อมไม่ได้: ' + esc(e.message)); });
    };
    var ap = root.querySelector('#apiPull');
    if (ap) ap.onclick = function () {
      if (ab) RP.api.setBase(ab.value);
      ui.toast('กำลังดึงสถานะจาก backend…');
      RP.api.integrations().then(function (res) {
        liveInt = res.integrations;
        ui.toast('ดึงสถานะจริงแล้ว — พร้อมวัดผล: ' + (res.ready_for_measurement ? '✓ ครบ' : 'ยังไม่ครบ'));
        root.querySelector('#setBody').innerHTML = bodyFor(curTab); wire(root);
      }).catch(function (e) { ui.toast('ดึงไม่ได้: ' + esc(e.message)); });
    };
  }
  function wrapTabs() { return '<div id="setTabs">' + tabsBar() + '</div>'; }

  RP.views.settings = function () {
    var p = curProj();
    var html =
      ui.pageHead({ eyebrow: 'ระบบ · Settings', title: 'การตั้งค่า',
        desc: 'ตั้งค่าการเชื่อมต่อ (API/บัญชี) ที่จำเป็นก่อนระบบจะวัดผลได้จริง ตั้งค่าเฉพาะโปรเจ็ค จัดการทีม/แพ็กเกจ และดูว่า "การวัดผลทำงานยังไงของจริง" — โปรเจ็คปัจจุบัน: <b>' + esc(p.name) + '</b>' }) +
      wrapTabs() +
      '<div id="setBody">' + bodyFor(curTab) + '</div>';
    return { html: html, mount: function (root) { wire(root); } };
  };

})(window.RP);

</script>
<script>
/* assets/js/app.js */
/* ============================================================
   RankPilot AI — App shell / router / navigation
   View contract:
     RP.views.<id> = function () {
        return { html: '<...>', mount: function(rootEl){ attach listeners } };
     }
   ============================================================ */
(function (RP) {
  'use strict';

  var NAV = [
    { section: 'ภาพรวม', items: [
      { id: 'dashboard', code: '', ico: '📊', lbl: 'แดชบอร์ดหลัก' }
    ]},
    { section: 'โมดูลของแพลตฟอร์ม', items: [
      { id: 'm1', code: 'M1', ico: '🔎', lbl: 'ขุดคำถาม & คีย์เวิร์ด' },
      { id: 'm2', code: 'M2', ico: '🏭', lbl: 'โรงงานคอนเทนต์' },
      { id: 'm3', code: 'M3', ico: '⚙️', lbl: 'AEO Optimizer' },
      { id: 'm4', code: 'M4', ico: '🚀', lbl: 'เผยแพร่อัตโนมัติ' },
      { id: 'm5', code: 'M5', ico: '📈', lbl: 'วัดผล & Rank Tracker' },
      { id: 'm6', code: 'M6', ico: '🧠', lbl: 'Learning Loop' }
    ]},
    { section: 'รายงาน', items: [
      { id: 'report', code: '', ico: '📑', lbl: 'รายงาน & Roadmap' }
    ]},
    { section: 'ระบบ', items: [
      { id: 'projects', code: '', ico: '🗂️', lbl: 'จัดการโปรเจ็ค' },
      { id: 'settings', code: '', ico: '⚙️', lbl: 'การตั้งค่า' }
    ]}
  ];

  var TITLES = {
    dashboard: 'แดชบอร์ดหลัก',
    m1: 'M1 · ขุดคำถาม & คีย์เวิร์ด',
    m2: 'M2 · โรงงานคอนเทนต์',
    m3: 'M3 · AEO Optimizer',
    m4: 'M4 · เผยแพร่อัตโนมัติ',
    m5: 'M5 · วัดผล & Rank Tracker',
    m6: 'M6 · Learning Loop',
    report: 'รายงาน & Roadmap',
    projects: 'จัดการโปรเจ็ค',
    settings: 'การตั้งค่า'
  };

  function currentRoute() {
    var h = (location.hash || '').replace(/^#\/?/, '');
    return RP.views[h] ? h : 'dashboard';
  }

  function renderSidebar() {
    var navHtml = NAV.map(function (grp) {
      return '<div class="nav-section">' + grp.section + '</div>' +
        grp.items.map(function (it) {
          return '<button class="nav-item" data-route="' + it.id + '">' +
            '<span class="ico">' + it.ico + '</span>' +
            '<span class="lbl">' + it.lbl + '</span>' +
            (it.code ? '<span class="code">' + it.code + '</span>' : '') +
            '</button>';
        }).join('');
    }).join('');

    return '<div class="brand">' +
        '<div class="logo">R</div>' +
        '<div><div class="name">Rank<span>Pilot</span> AI</div>' +
        '<div class="tag">AEO + SEO · อัตโนมัติด้วย AI</div></div>' +
      '</div>' +
      '<nav class="nav">' + navHtml + '</nav>' +
      '<div class="sidebar-foot">' + userChip() +
        '<div class="small soft">เอกสารโครงการ v' + RP.data.meta.version + ' · ระบบทำงานเองได้ ~' + RP.data.meta.autoLevel + '%</div></div>';
  }

  function userChip() {
    var u = (RP.auth && RP.auth.user()) || { email: 'ผู้ใช้เดโม' };
    var initial = (u.email || 'U').charAt(0).toUpperCase();
    return '<div class="user-chip"><div class="ua">' + initial + '</div>' +
      '<div class="uinfo"><div class="un">' + RP.esc(u.email) + '</div><div class="ur">' + RP.esc(RP.data.account.plan) + '</div></div>' +
      '<button class="icon-btn" id="logoutBtn" title="ออกจากระบบ" style="width:32px;height:32px">⎋</button></div>';
  }

  function projectSelector() {
    var p = RP.data.project;
    return '<select class="select" id="projSel" aria-label="เลือกโปรเจ็ค">' +
      p.list.map(function (x) {
        return '<option value="' + x.id + '"' + (x.id === p.current ? ' selected' : '') + '>โปรเจ็ค: ' + RP.esc(x.name) + '</option>';
      }).join('') + '</select>';
  }

  function modePill() {
    var cur = RP.data.project.list.filter(function (x) { return x.id === RP.data.project.current; })[0];
    var auto = cur && cur.mode === 'auto';
    return '<span class="mode-pill" id="modePill" title="สลับโหมดเผยแพร่">' +
      '<span class="dot" style="background:' + (auto ? 'var(--green-500)' : 'var(--amber-500)') + '"></span>' +
      (auto ? 'Full-Auto 100%' : 'Auto + Human Approve') + '</span>';
  }

  function renderTopbar(route) {
    return '<button class="icon-btn mobile-nav-btn" id="mNav" aria-label="เมนู">☰</button>' +
      '<div class="crumbs">RankPilot AI <span class="soft">/</span> <b>' + (TITLES[route] || '') + '</b></div>' +
      '<span class="spacer"></span>' +
      projectSelector() +
      modePill() +
      '<button class="icon-btn" id="themeBtn" aria-label="สลับธีม" title="สลับสว่าง/มืด">🌙</button>';
  }

  function mountRoute() {
    var route = currentRoute();
    var contentEl = document.getElementById('content');
    var topbarEl = document.getElementById('topbar');

    topbarEl.innerHTML = renderTopbar(route);
    wireTopbar();

    // active nav
    Array.prototype.forEach.call(document.querySelectorAll('.nav-item'), function (b) {
      b.classList.toggle('active', b.getAttribute('data-route') === route);
    });

    var factory = RP.views[route];
    var out;
    try {
      out = factory();
    } catch (e) {
      out = { html: errorCard(route, e), mount: null };
      console.error('View render error:', route, e);
    }
    contentEl.innerHTML = '<div class="view">' + (out && out.html ? out.html : '') + '</div>';
    if (out && typeof out.mount === 'function') {
      try { out.mount(contentEl); } catch (e2) { console.error('View mount error:', route, e2); }
    }
    contentEl.scrollTop = 0;
    window.scrollTo(0, 0);
    closeMobileNav();
  }

  function errorCard(route, e) {
    return '<div class="warn-box"><b>โหลดหน้า "' + route + '" ไม่สำเร็จ</b><br>' +
      RP.esc(e && e.message ? e.message : String(e)) + '</div>';
  }

  /* ---- interactions ---- */
  function wireNav() {
    Array.prototype.forEach.call(document.querySelectorAll('.nav-item'), function (b) {
      b.onclick = function () { location.hash = '#/' + b.getAttribute('data-route'); };
    });
  }

  function wireTopbar() {
    var sel = document.getElementById('projSel');
    if (sel) sel.onchange = function () {
      RP.data.project.current = sel.value;
      RP.ui.toast('สลับโปรเจ็คเป็น <b>' + RP.esc(sel.options[sel.selectedIndex].text.replace('โปรเจ็ค: ', '')) + '</b>');
      document.getElementById('modePill').outerHTML = modePill();
      mountRoute();
    };
    var mp = document.getElementById('modePill');
    if (mp) mp.onclick = function () {
      var cur = RP.data.project.list.filter(function (x) { return x.id === RP.data.project.current; })[0];
      cur.mode = cur.mode === 'auto' ? 'approve' : 'auto';
      mp.outerHTML = modePill();
      RP.ui.toast('โหมดเผยแพร่: <b>' + (cur.mode === 'auto' ? 'Full-Auto 100%' : 'Auto + Human Approve') + '</b>');
      wireTopbar();
    };
    var tb = document.getElementById('themeBtn');
    if (tb) {
      tb.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
      tb.onclick = toggleTheme;
    }
    var mn = document.getElementById('mNav');
    if (mn) mn.onclick = openMobileNav;
  }

  function toggleTheme() {
    var root = document.documentElement;
    var dark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', dark ? 'light' : 'dark');
    try { localStorage.setItem('rp-theme', dark ? 'light' : 'dark'); } catch (e) {}
    document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  }

  function openMobileNav() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('scrim').classList.add('show');
  }
  function closeMobileNav() {
    var sb = document.querySelector('.sidebar'); if (sb) sb.classList.remove('open');
    var sc = document.getElementById('scrim'); if (sc) sc.classList.remove('show');
  }

  /* ---- boot ---- */
  function boot() {
    try {
      var saved = localStorage.getItem('rp-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    } catch (e) {}

    // โหมดใช้งานจริง: ต้องเข้าสู่ระบบก่อน
    if (RP.auth && !RP.auth.user()) { RP.showLogin(startApp); return; }
    startApp();
  }

  function startApp() {
    document.getElementById('sidebar').innerHTML = renderSidebar();
    wireNav(); wireUser();
    document.getElementById('scrim').onclick = closeMobileNav;

    window.removeEventListener('hashchange', mountRoute);
    window.addEventListener('hashchange', mountRoute);
    if (!location.hash) location.hash = '#/dashboard';
    mountRoute();

    // ครั้งแรก: แสดง onboarding ตามลำดับ
    if (RP.auth && !RP.auth.onboarded()) setTimeout(function () { if (RP.showOnboarding) RP.showOnboarding(); }, 350);
  }

  function wireUser() {
    var lo = document.getElementById('logoutBtn');
    if (lo) lo.onclick = function () { if (RP.auth) RP.auth.logout(); if (RP.api) RP.api.setToken(''); location.reload(); };
  }

  RP.go = function (route) { location.hash = '#/' + route; };
  RP.boot = boot;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else { boot(); }

})(window.RP);

</script>
</body>
</html>
