# เสิร์ฟ frontend + proxy /api และ /health ไป backend (same-origin ไม่ต้องพึ่ง CORS)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # เรียก backend ผ่าน path เดียวกัน — ในหน้า "การตั้งค่า" ให้เว้น base URL ว่างไว้
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }
    location = /health {
        proxy_pass http://api:8000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
