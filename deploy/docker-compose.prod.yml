# RankPilot / ImVisible — Production stack สำหรับ BytePlus ECS (Ubuntu)
# รัน:  cd deploy && cp .env.example .env  (แก้ค่า) && docker compose -f docker-compose.prod.yml up -d
# ได้ครบ: WordPress(imvisible.tech) + แดชบอร์ด(app.imvisible.tech) + backend + คิวงาน + DB + Auto-HTTPS
services:

  # ---------- Edge: reverse proxy + Auto-HTTPS ----------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../index.html:/srv/frontend/index.html:ro
      - ../assets:/srv/frontend/assets:ro
      - ../content/landing:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [wordpress, api]

  # ---------- เว็บคอนเทนต์ (WordPress) ----------
  wordpress:
    image: wordpress:php8.3-apache
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: wpdb
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
    depends_on: [wpdb]

  wpdb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - wpdb_data:/var/lib/mysql

  # ---------- แพลตฟอร์ม ImVisible (backend) ----------
  api:
    build: ../backend
    restart: unless-stopped
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://imvisible:${POSTGRES_PASSWORD}@db:5432/imvisible
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: "*"
      APP_ENV: prod
      APP_BASE_URL: https://${APP_DOMAIN}
      MANAGED_BASE_DOMAIN: ${DOMAIN}
      GOOGLE_REDIRECT_URI: https://${APP_DOMAIN}/api/oauth/google/callback
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ../backend
    restart: unless-stopped
    # ขยาย throughput: ผลิตหลายบทความพร้อมกัน (งานเป็น I/O-bound รอ LLM/รูป จึงตั้งเกินจำนวน CPU ได้)
    # prefetch=1 กันงานยาว (บทความ) กองหลังงานเดียว · max-tasks-per-child กัน memory โต 24/7
    command: celery -A app.worker.celery_app worker -l info --concurrency=8 --prefetch-multiplier=1 --max-tasks-per-child=40
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://imvisible:${POSTGRES_PASSWORD}@db:5432/imvisible
      REDIS_URL: redis://redis:6379/0
      # สำคัญ (crypto): worker ต้องใช้ JWT_SECRET เดียวกับ api ไม่งั้นถอดรหัสคีย์ลูกค้าไม่ได้
      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: prod
      MANAGED_BASE_DOMAIN: ${DOMAIN}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  beat:
    build: ../backend
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat -l info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }

  # ---------- ฐานข้อมูล ----------
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: imvisible
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: imvisible
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imvisible"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  caddy_data:
  caddy_config:
  wp_data:
  wpdb_data:
  pgdata:
